<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Goldslep Analiz</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a56a0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Goldslep">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── SCREEN STYLES ── */
:root{
  --acc:#1a56a0; --acc2:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  --pink:#e91e8c; --teal:#00bcd4; --purple:#7c3aed; --orange:#f97316;
  --indigo:#4f46e5; --cyan:#0891b2;
  --border:#dde3ec; --bg:#f4f6f9; --white:#fff;
  --text:#1e293b; --muted:#64748b; --light:#f8fafc;
  --font:'Roboto',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;font-size:12px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:var(--acc);flex-shrink:0;}
.logo-wrap{display:flex;align-items:center;gap:8px;}
.logo-icon{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-text{font-size:13px;font-weight:700;color:#fff;letter-spacing:.5px;}
.logo-sub{font-size:8px;color:rgba(255,255,255,.7);letter-spacing:1px;}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center;}
.count-pill{font-size:10px;padding:3px 8px;border-radius:12px;
  background:rgba(255,255,255,.2);color:#fff;font-weight:600;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:180px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:550px){.sidebar{width:120px;}}
.sidebar-head{padding:8px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:4px;
  background:var(--acc);color:#fff;font-weight:600;font-size:10px;
  padding:7px;border-radius:6px;cursor:pointer;border:none;width:100%;}
.btn-secondary{display:flex;align-items:center;justify-content:center;gap:4px;
  background:transparent;border:1px solid var(--border);color:var(--muted);font-size:10px;
  padding:6px;border-radius:6px;cursor:pointer;width:100%;}
.btn-secondary:hover{border-color:var(--acc);color:var(--acc);}
input[type=file]{display:none;}
.file-list{flex:1;overflow-y:auto;padding:5px;}
.ov-item{padding:7px 8px;border-radius:6px;cursor:pointer;margin-bottom:3px;
  background:var(--light);border-left:3px solid var(--acc);}
.ov-item:hover,.ov-item.active{background:#e8f0fb;}
.ov-label{font-size:10px;font-weight:600;color:var(--acc);}
.ov-sub{font-size:9px;color:var(--muted);margin-top:1px;}
.file-item{padding:6px 7px;border-radius:6px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}
.file-item:hover{background:var(--light);}
.file-item.active{background:#e8f0fb;border-color:rgba(26,86,160,.2);}
.fi-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-meta{font-size:9px;color:var(--muted);margin-top:1px;}
.fi-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:10px;background:var(--bg);}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;gap:10px;}
.welcome .wi{font-size:48px;opacity:.2;}
.welcome h2{font-size:15px;font-weight:600;color:var(--muted);}
.welcome p{font-size:11px;color:var(--muted);max-width:220px;line-height:1.6;}

/* TABS */
.tabs{display:flex;background:var(--white);border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:10px;}
.tab{padding:7px 10px;font-size:10px;font-weight:600;cursor:pointer;color:var(--muted);
  flex:1;text-align:center;border-right:1px solid var(--border);transition:all .15s;}
.tab:last-child{border-right:none;}
.tab.active{background:var(--acc);color:#fff;}
.tab-pane{display:none;}
.tab-pane.active{display:block;animation:fu .2s ease;}
@keyframes fu{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ── PRINT DOCUMENT STYLES ── */
/* The report is built as a .report-doc div, hidden on screen, shown on print */
.report-doc{display:none;}

/* ── SCREEN REPORT VIEW ── */
.screen-report{}

/* ── SHARED SECTION STYLES ── */
.rp-section{background:var(--white);border:1px solid var(--border);border-radius:8px;
  margin-bottom:8px;overflow:hidden;}
.rp-section-head{padding:5px 8px;display:flex;align-items:center;justify-content:space-between;}
.rp-section-label{font-size:9px;font-weight:700;color:#fff;padding:2px 7px;border-radius:3px;letter-spacing:.3px;}
.rp-section-avg{display:flex;align-items:center;gap:4px;}
.rp-avg-label{font-size:9px;color:var(--muted);}
.rp-avg-val{font-size:10px;font-weight:700;color:#fff;padding:1px 7px;border-radius:3px;}
.rp-chart-body{padding:6px 8px 8px;}
.rp-chart{position:relative;}
.rp-chart.h90{height:90px;}
.rp-chart.h100{height:100px;}
.rp-chart.h110{height:110px;}
.rp-chart.h130{height:130px;}
.rp-chart.h150{height:150px;}

/* ÖZET TABLE */
.sum-outer{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.sum-title-bar{background:var(--acc);color:#fff;font-size:10px;font-weight:700;
  padding:5px 10px;letter-spacing:.5px;}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;}
.sum-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.sum-row:nth-child(even){border-right:none;}
.sum-row:nth-last-child(-n+2){border-bottom:none;}
.sum-lbl{font-size:10px;color:var(--muted);font-weight:500;}
.sum-val{font-size:10px;font-weight:700;color:var(--text);}

/* INFO HEADER */
.info-header{background:var(--white);border:1px solid var(--border);border-radius:8px;
  padding:10px;margin-bottom:8px;}
.ih-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.ih-logo{display:flex;align-items:center;gap:8px;}
.ih-logo-icon{font-size:22px;}
.ih-logo-text .gs{font-size:18px;font-weight:900;letter-spacing:1px;}
.ih-logo-text .gs b{color:var(--acc);}
.ih-logo-text .gs span{color:var(--warn);}
.ih-logo-text .gs-sub{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.ih-title{font-size:16px;font-weight:800;color:var(--acc);letter-spacing:2px;text-transform:uppercase;}
.ih-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.ih-divider{height:3px;background:linear-gradient(90deg,var(--acc),var(--warn),var(--acc));
  border-radius:2px;margin:8px 0;}
.ih-badges{display:flex;gap:6px;flex-wrap:wrap;}
.ih-badge{font-size:9px;font-weight:700;padding:3px 10px;border-radius:12px;color:#fff;}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:8px;}
.sc{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:8px;
  border-left:3px solid;}
.sc-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sc-val{font-size:16px;font-weight:700;font-family:monospace;}
.sc-unit{font-size:8px;color:var(--muted);}

/* ALERT */
.alert-box{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border-radius:6px;
  margin-bottom:5px;border-left:3px solid;}
.alert-box.danger{background:#fef2f2;border-color:var(--danger);}
.alert-box.warn{background:#fffbeb;border-color:var(--warn);}
.alert-box.ok{background:#f0fdf4;border-color:var(--acc2);}
.ab-title{font-size:10px;font-weight:600;}
.ab-desc{font-size:9px;color:var(--muted);margin-top:1px;}

/* DAILY TABLE */
.dt-wrap{overflow-x:auto;}
.dt{width:100%;border-collapse:collapse;font-size:9px;}
.dt th{padding:4px 5px;background:var(--acc);color:#fff;border:1px solid #1347880;text-align:center;font-weight:600;}
.dt td{padding:3px 5px;border:1px solid var(--border);text-align:center;}
.dt tr.r-ok td{background:#dcfce7;}
.dt tr.r-warn td{background:#fef3c7;}
.dt tr.r-danger td{background:#fee2e2;}
.dt tr.r-unused td{color:#aaa;background:var(--light);}
.dt tr:hover td{opacity:.85;cursor:pointer;}

/* INSTALL BANNER */
#installBanner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:var(--acc);padding:10px 14px;align-items:center;justify-content:space-between;}
.ib-btn{background:#fff;color:var(--acc);font-weight:700;padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:10px;}
.ib-skip{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:9px;}

/* ══════════════════════════════════
   PRINT STYLES — PDF gibi
══════════════════════════════════ */
@media print {
  @page { margin:8mm; size:A4; }
  *{ -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; }

  .sidebar,.topbar,#installBanner,.tabs,.btn-primary,.btn-secondary,.screen-only{ display:none!important; }
  /* Tab pane'leri yazdırmada göster */
  .tab-pane{ display:block!important; }
  /* Canvas'ları gizle (img ile değiştirildi) */
  canvas{ display:none!important; }
  /* Img'leri göster */
  canvas+img, .pdf-chart img, .rp-chart img{ display:block!important; width:100%!important; }
  /* Günlük tablo her zaman görünsün */
  .dt-wrap, .dt{ display:block!important; }
  .dt{ width:100%!important; }
  body,html{ overflow:visible!important; height:auto!important; background:#fff!important; font-family:'Roboto',sans-serif!important; }
  .layout{ display:block!important; }
  .main{ overflow:visible!important; padding:0!important; height:auto!important; background:#fff!important; }
  .tab-pane{ display:block!important; }

  /* Print pages */
  .print-page{ page-break-after:always; }
  .print-page:last-child{ page-break-after:avoid; }

  /* PDF report doc visible on print */
  .report-doc{ display:block!important; }
  .screen-report{ display:none!important; }
  /* Tablo satırları print renkleri */
  .dt tr.r-ok td{ background-color:#dcfce7!important; }
  .dt tr.r-warn td{ background-color:#fef3c7!important; }
  .dt tr.r-danger td{ background-color:#fee2e2!important; }
  .dt tr.r-unused td{ background-color:#f1f5f9!important; color:#94a3b8!important; }
  .dt th{ background-color:#1a56a0!important; color:#fff!important; }
  /* Özet tablo renkleri */
  .sum-title-bar{ background-color:#1a56a0!important; color:#fff!important; }
  .pdf-cs-head{ -webkit-print-color-adjust:exact!important; }
  .pdf-cs-label{ -webkit-print-color-adjust:exact!important; }
  .pdf-cs-avg{ -webkit-print-color-adjust:exact!important; }

  /* PDF page layout */
  .pdf-page{ page-break-after:always; padding:0; }
  .pdf-page:last-child{ page-break-after:avoid; }

  /* PDF header */
  .pdf-header{ display:flex!important; align-items:flex-start; justify-content:space-between; margin-bottom:6px; }
  .pdf-h-left .pdf-title{ font-size:18px; font-weight:900; color:#222; letter-spacing:.5px; }
  .pdf-h-left .pdf-meta{ font-size:9px; color:#555; margin-top:2px; }
  .pdf-h-right .pdf-logo{ font-size:20px; font-weight:900; letter-spacing:1px; }
  .pdf-h-right .pdf-logo b{ color:#1a56a0; }
  .pdf-h-right .pdf-logo span{ color:#f59e0b; }

  /* PDF info rows */
  .pdf-info-row{ font-size:9px; color:#333; margin-bottom:2px; }
  .pdf-info-row b{ color:#1a56a0; }

  /* PDF user/doctor table */
  .pdf-ud-table{ width:100%; border-collapse:collapse; font-size:9px; margin:6px 0; }
  .pdf-ud-table td{ padding:3px 8px; border:1px solid #ccc; vertical-align:top; width:50%; }
  .pdf-ud-table .ud-head{ background:#1a56a0; color:#fff; font-weight:700; font-size:9px; }

  /* PDF özet table */
  .pdf-sum-table{ width:100%; border-collapse:collapse; font-size:9px; margin:6px 0; }
  .pdf-sum-table .sum-head td{ background:#1a56a0; color:#fff; font-weight:700; text-align:center; padding:4px 8px; }
  .pdf-sum-table td{ padding:4px 8px; border:1px solid #ccc; }
  .pdf-sum-table .lbl{ color:#555; font-weight:500; width:28%; }
  .pdf-sum-table .val{ font-weight:700; color:#111; width:22%; }

  /* PDF chart section */
  .pdf-cs{ margin-bottom:6px; border:1px solid #ccc; }
  .pdf-cs-head{ display:flex!important; align-items:center; justify-content:space-between;
    padding:3px 7px; }
  .pdf-cs-label{ font-size:8px; font-weight:700; color:#fff; padding:1px 6px; border-radius:2px; }
  .pdf-cs-avg-box{ display:flex!important; align-items:center; gap:10px; }
  .pdf-cs-avg{ font-size:9px; font-weight:700; color:#fff; padding:1px 7px; border-radius:2px; }
  .pdf-cs-avg-label{ font-size:8px; color:#555; }
  .pdf-cs-body{ padding:3px 5px 5px; }
  .pdf-chart{ position:relative; }
  .pdf-chart.h80{ height:80px; }
  .pdf-chart.h90{ height:90px; }
  .pdf-chart.h100{ height:100px; }
  .pdf-chart.h110{ height:110px; }
  .pdf-chart.h120{ height:120px; }
  .pdf-chart.h150{ height:150px; }

  /* PDF 2-col layout for last page */
  .pdf-2col{ display:grid!important; grid-template-columns:1fr 1fr; gap:8px; }

  /* PDF daily table */
  .pdf-month-title{ font-size:9px; font-weight:700; color:#fff; background:#555; padding:3px 8px; margin-bottom:4px; }
  .pdf-daily-bar-row{ display:flex; align-items:center; font-size:8px; margin-bottom:1px; }
  .pdf-day-label{ width:65px; color:#333; }
  .pdf-day-bar{ height:12px; border-radius:1px; min-width:1px; }
  .pdf-day-time{ margin-left:5px; color:#333; font-weight:600; }

  /* PDF events dot chart */
  .pdf-evt-row{ display:flex; align-items:center; font-size:8px; margin-bottom:1px; }
  .pdf-evt-label{ width:65px; color:#333; }
  .pdf-evt-dot{ width:5px; height:5px; border-radius:50%; display:inline-block; margin:0 1px; }
  .pdf-evt-time{ margin-left:5px; color:#333; font-size:7px; }

  /* Page numbers */
  .pdf-page-num{ text-align:right; font-size:8px; color:#999; margin-top:4px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo-wrap">
    <div class="logo-icon">🫁</div>
    <div>
      <div class="logo-text">GOLD<span style="color:#fbbf24">SLEEP</span></div>
      <div class="logo-sub">ANALİZ SİSTEMİ</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="count-pill" id="topCount">0 gün</div>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <label class="btn-primary" for="folderInput">📁 Klasör Seç</label>
      <input type="file" id="folderInput" webkitdirectory multiple accept=".gsd">
      <label class="btn-secondary" for="filesInput">📄 Dosya Seç</label>
      <input type="file" id="filesInput" multiple accept=".gsd">
    </div>
    <div class="file-list" id="fileList">
      <div style="padding:16px 6px;text-align:center;color:var(--muted);font-size:9px;line-height:1.8;">GSD klasörünü seçin</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="welcome">
      <div class="wi">🫁</div>
      <h2>Goldslep Detaylı Analiz</h2>
      <p>Sol taraftan <strong>Klasör Seç</strong> ile GSD klasörünü seçin.</p>
    </div>
  </div>
</div>

<!-- INSTALL -->
<div id="installBanner">
  <div style="color:#fff"><div style="font-size:11px;font-weight:700;">📲 Ana Ekrana Ekle</div></div>
  <div style="display:flex;gap:5px;">
    <button class="ib-skip" onclick="document.getElementById('installBanner').style.display='none'">Sonra</button>
    <button class="ib-btn" onclick="installApp()">Kur</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// STATE & HELPERS
// ═══════════════════════════════════════════
let dayRecords=[], activeIdx=-2, CH={};

function parseGSD(txt,fn){
  const d={_fn:fn,_recs:[]};
  txt.split('\n').forEach(l=>{
    l=l.trim();if(!l)return;
    const eq=l.indexOf('=');
    if(eq>-1) d[l.slice(0,eq).trim()]=l.slice(eq+1).trim();
  });
  return d;
}
function toMin(t){if(!t)return 0;const p=t.split(':');return parseInt(p[0]||0)*60+parseInt(p[1]||0);}
function fmtMin(m){const h=Math.floor(m/60),mn=Math.round(m%60);return h+'s '+(mn<10?'0':'')+mn+'dk';}
function fmtH(m){const h=Math.floor(m/60),mn=Math.round(m%60);return h+' Saat '+(mn>0?mn+' Dakika':'');}
function pDate(s){if(!s)return 0;const p=s.split('.');return p.length===3?new Date(p[2],p[1]-1,p[0]).getTime():0;}
function avg(a){return a.length?a.reduce((s,v)=>s+v,0)/a.length:0;}
function today(){const d=new Date();return d.toLocaleDateString('tr-TR');}

// ═══════════════════════════════════════════
// MERGE BY DATE
// ═══════════════════════════════════════════
function mergeByDate(raw){
  const seen=new Set();
  const uniq=raw.filter(r=>{
    const k=(r['Date']||'')+'|'+(r['Sleep Time']||'')+'|'+(r['Sleep Duration']||'');
    if(seen.has(k))return false;seen.add(k);return true;
  });
  const grp={};
  uniq.forEach(r=>{const d=r['Date']||'?';if(!grp[d])grp[d]=[];grp[d].push(r);});
  const merged=[];
  Object.keys(grp).forEach(date=>{
    const ss=grp[date];
    const totalMin=ss.reduce((s,r)=>s+toMin(r['Sleep Duration']),0);
    let wLeak=0,lMin=0,wAHI=0,wAI=0;
    ss.forEach(r=>{
      const m=toMin(r['Sleep Duration']);
      if(m>=10){wLeak+=parseFloat(r['Leak']||0)*m;lMin+=m;}
      wAHI+=parseFloat(r['AHI']||0)*m;
      wAI+=parseFloat(r['AI']||0)*m;
    });
    if(lMin===0&&ss.length){
      const lg=ss.reduce((a,b)=>toMin(a['Sleep Duration'])>=toMin(b['Sleep Duration'])?a:b);
      const lm=toMin(lg['Sleep Duration'])||1;
      wLeak=parseFloat(lg['Leak']||0)*lm;lMin=lm;
    }
    const base=ss[0];
    merged.push({
      date,
      mode:base['Therapy Mode']||'CPAP',
      epap:parseFloat(base['EPAP']||0),
      ipap:parseFloat(base['IPAP']||0),
      sleepTime:ss[0]['Sleep Time']||'—',
      wakeTime:ss[ss.length-1]['Wakeup Time']||'—',
      totalMin,
      ahi:totalMin>0?Math.round(wAHI/totalMin*100)/100:0,
      ai:totalMin>0?Math.round(wAI/totalMin*100)/100:0,
      leak:lMin>0?Math.round(wLeak/lMin*10)/10:0,
      serino:base['serino']||'—',
      sessions:ss.length,
      weight:base['Patient Weight']||'—',
    });
  });
  merged.sort((a,b)=>pDate(a.date)-pDate(b.date));
  return merged;
}

// ═══════════════════════════════════════════
// FILE INPUT
// ═══════════════════════════════════════════
document.getElementById('folderInput').addEventListener('change',handleFiles);
document.getElementById('filesInput').addEventListener('change',handleFiles);
function handleFiles(e){
  const files=Array.from(e.target.files).filter(f=>f.name.toLowerCase().endsWith('.gsd'));
  if(!files.length){alert('GSD dosyası bulunamadı.');return;}
  let done=0;const raw=[];
  files.forEach(f=>{
    const rd=new FileReader();
    rd.onload=ev=>{raw.push(parseGSD(ev.target.result,f.name));
      if(++done===files.length){
        dayRecords=mergeByDate(raw);
        document.getElementById('topCount').textContent=dayRecords.length+' gün';
        renderSidebar();showOverview();
      }};
    rd.readAsText(f);
  });
  e.target.value='';
}

// ═══════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════
function stOf(d){
  if(d.leak>24||d.ahi>5)return{c:'#ef4444',l:'danger'};
  if(d.leak>15||d.ahi>2)return{c:'#f59e0b',l:'warn'};
  if(d.totalMin===0)return{c:'#cbd5e1',l:'unused'};
  return{c:'#22c55e',l:'ok'};

const CG='rgba(150,160,180,.2)', CT='#64748b';

function mkBar(id,labels,data,color,ymin,ymax,thresh,bg){
  const ctx=document.getElementById(id);if(!ctx)return;
  if(CH[id])CH[id].destroy();
  const ds=[{data,borderRadius:2,borderSkipped:false,
    backgroundColor:data.map(v=>thresh&&v>thresh?'rgba(220,38,38,.9)':color)}];

    borderColor:'rgba(220,38,38,.5)',borderDash:[4,3],borderWidth:1,pointRadius:0,fill:false});
  CH[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:CT,font:{size:7},maxRotation:45},grid:{color:CG},
          ...(bg?{backgroundColor:bg}:{})},

function calcStats(){
  const dates=dayRecords.map(d=>d.date);
  const ahis=dayRecords.map(d=>d.ahi);
  const ais=dayRecords.map(d=>d.ai);
  const leaks=dayRecords.map(d=>d.leak);
  const sleeps=dayRecords.map(d=>d.totalMin);
  const epaps=dayRecords.map(d=>d.epap);
  const total=dayRecords.length;
  const used=dayRecords.filter(d=>d.totalMin>0).length;
  const unused=total-used;
  const above4=dayRecords.filter(d=>d.totalMin>=240).length;
  const below4=dayRecords.filter(d=>d.totalMin>0&&d.totalMin<240).length;
  const usedMins=sleeps.filter(m=>m>0);
  const avgUsed=avg(usedMins);
  const totalMin=sleeps.reduce((a,b)=>a+b,0);
  const minUse=usedMins.length?Math.min(...usedMins):0;
  const maxUse=usedMins.length?Math.max(...usedMins):0;
  let wL=0,wT=0,wA=0;
  dayRecords.forEach(d=>{if(d.totalMin>=30){wL+=d.leak*d.totalMin;wT+=d.totalMin;wA+=d.ahi*d.totalMin;}});
  const avgLeak=wT>0?Math.round(wL/wT*10)/10:0;
  const avgAHI=wT>0?Math.round(wA/wT*100)/100:0;
  const avgAI=Math.round(avg(ais.filter(v=>v>0))*100)/100||0;
  const crit=dayRecords.filter(d=>d.leak>24||d.ahi>5).length;
  const first=dayRecords[0].date, last=dayRecords[dayRecords.length-1].date;
  const serino=dayRecords[0].serino, mode=dayRecords[0].mode, epap=dayRecords[0].epap;
  return{dates,ahis,ais,leaks,sleeps,epaps,total,used,unused,above4,below4,
    avgUsed,totalMin,minUse,maxUse,avgLeak,avgAHI,avgAI,crit,first,last,serino,mode,epap};
}

function buildAlerts(avgLeak,avgAHI,below4,crit,id){
  const el=document.getElementById(id);if(!el)return;
  const arr=[];
  if(avgLeak>24)arr.push({l:'danger',i:'🚨',t:`Ort. Kaçak Kritik: ${avgLeak} L/dk`,d:'Maske uyumunu kontrol edin.'});
  else if(avgLeak>15)arr.push({l:'warn',i:'⚠️',t:`Ort. Kaçak Yüksek: ${avgLeak} L/dk`,d:'Maske pozisyonuna dikkat.'});
  if(avgAHI>5)arr.push({l:'danger',i:'🚨',t:`Ort. AHI Yüksek: ${avgAHI}`,d:'Klinisyene danışın.'});
  if(crit>0)arr.push({l:'danger',i:'🚨',t:`${crit} kritik gece tespit edildi`,d:'Günlük tablodan detay görüntüleyin.'});
  if(below4>3)arr.push({l:'warn',i:'⚠️',t:`${below4} gecede kullanım 4 saatin altında`,d:'Günlük min. 4 saat önerilir.'});
  if(!arr.length)arr.push({l:'ok',i:'✅',t:'Dönem Geneli Normal',d:'Kritik uyarı tespit edilmedi.'});
  el.innerHTML=arr.map(a=>`<div class="alert-box ${a.l}">
    <span style="font-size:16px">${a.i}</span>
    <div><div class="ab-title">${a.t}</div><div class="ab-desc">${a.d}</div></div>
  </div>`).join('');
}

// PRINT
// ═══════════════════════════════════════════
function doPrint(){
  // 1) Tüm tab pane'leri göster
  const panes = document.querySelectorAll('.tab-pane');
  panes.forEach(t=>t.style.display='block');

  // 2) Print doc görünür yap
  const pd = document.getElementById('printDoc');
  if(pd) pd.style.display='block';

  // 3) Tüm canvas'ları img'ye çevir (yazıcı için)
  const canvases = document.querySelectorAll('canvas');
  const replaced = [];
  canvases.forEach(cv=>{
    try{
      const img = document.createElement('img');
      img.src = cv.toDataURL('image/png',1.0);
      img.style.cssText = cv.style.cssText;
      img.style.width = cv.offsetWidth+'px';
      img.style.height = cv.offsetHeight+'px';
      img.style.display = 'block';
      cv.parentNode.insertBefore(img,cv);
      cv.style.display='none';
      replaced.push({cv,img});
    }catch(e){}
  });

  // 4) Günlük tablo pane'ini de göster
  const tablo = document.getElementById('pTablo');
  if(tablo) tablo.style.display='block';

  // 5) Yazdır
  setTimeout(()=>{
    window.print();
    // 6) Geri al
    setTimeout(()=>{
      replaced.forEach(({cv,img})=>{cv.style.display='';img.remove();});
      panes.forEach(t=>t.style.display='');
      document.querySelectorAll('.tab-pane.active').forEach(t=>t.style.display='block');
      if(pd) pd.style.display='';
    },500);
  },300);
}

  </div>

  <div class="tab-pane" id="dd-esik">
    <div style="background:var(--light);border:1px solid var(--border);border-radius:7px;padding:10px;margin-bottom:8px;">
      <div style="font-size:10px;font-weight:700;margin-bottom:8px;">⚙️ Eşik Değerleri</div>
      ${[['Max. Kaçak','th-leak','24','L/dk'],['Max. AHI','th-ahi','5','/saat'],
        ['Max. AI','th-ai','5','/saat'],['Min. Uyku (dk)','th-sleep','240','dk']
      ].map(([l,id,v,u])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap;">
        <label style="font-size:10px;color:var(--muted);width:130px">${l}</label>
        <input id="${id}" type="number" value="${v}" style="background:#fff;border:1px solid var(--border);
          color:var(--text);padding:4px 7px;border-radius:5px;font-size:10px;width:65px;outline:none;">
        <span style="font-size:9px;color:var(--muted)">${u}</span>
      </div>`).join('')}
      <button onclick="runTh(${i})" style="background:var(--acc);color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:600;border:none;">🔍 Kontrol Et</button>
    </div>
    <div id="th-res"></div>
  </div>
  </div>`;

  buildDayAlerts(d,'dd-alerts');
  let drawn=false;
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      if(t.textContent==='Grafik'&&!drawn){drawn=true;setTimeout(()=>{
        mkBar('dd-p',['EPAP','IPAP'],[d.epap,d.ipap],'rgba(26,86,160,.9)',0,20,null);
        mkBar('dd-ahi',['AHI','AI'],[d.ahi,d.ai],'rgba(79,70,229,.9)',0,null,5);
        mkLeak('dd-l',['Kaçak'],[d.leak]);
      },60);}
    });
  });
}

function buildDayAlerts(d,id){
  const arr=[];
  if(d.leak>24)arr.push({l:'danger',i:'🚨',t:`Yüksek Kaçak: ${d.leak} L/dk`,d:'Maske uyumunu kontrol edin.'});
  else if(d.leak>15)arr.push({l:'warn',i:'⚠️',t:`Orta Kaçak: ${d.leak} L/dk`,d:'Maske pozisyonuna dikkat.'});
  if(d.ahi>5)arr.push({l:'danger',i:'🚨',t:`Yüksek AHI: ${d.ahi}`,d:'Klinisyene danışın.'});
  if(d.ai>5)arr.push({l:'danger',i:'🚨',t:`Yüksek AI: ${d.ai}`,d:'Apne olayları yüksek.'});
  if(d.totalMin<240&&d.totalMin>0)arr.push({l:'warn',i:'⚠️',t:`Kısa Uyku: ${fmtMin(d.totalMin)}`,d:'Min. 4 saat önerilir.'});
  if(d.sessions>1)arr.push({l:'warn',i:'ℹ️',t:`${d.sessions} oturum birleştirildi`,d:'Değerler ağırlıklı ortalamadır.'});
  if(!arr.length)arr.push({l:'ok',i:'✅',t:'Tüm Değerler Normal',d:'Kritik uyarı yok.'});
  document.getElementById(id).innerHTML=arr.map(a=>`<div class="alert-box ${a.l}">
    <span style="font-size:15px">${a.i}</span>
    <div><div class="ab-title">${a.t}</div><div class="ab-desc">${a.d}</div></div>
  </div>`).join('');
}

function runTh(i){
  const d=dayRecords[i];
  const tl=parseFloat(document.getElementById('th-leak').value)||24;
  const ta=parseFloat(document.getElementById('th-ahi').value)||5;
  const ti=parseFloat(document.getElementById('th-ai').value)||5;
  const ts=parseFloat(document.getElementById('th-sleep').value)||240;
  const arr=[];
  if(d.leak>tl)arr.push({l:'danger',i:'🚨',t:`Kaçak: ${d.leak} > ${tl} L/dk`});
  if(d.ahi>ta)arr.push({l:'danger',i:'🚨',t:`AHI: ${d.ahi} > ${ta}`});
  if(d.ai>ti)arr.push({l:'danger',i:'🚨',t:`AI: ${d.ai} > ${ti}`});
  if(d.totalMin<ts&&d.totalMin>0)arr.push({l:'warn',i:'⚠️',t:`Uyku: ${fmtMin(d.totalMin)} < ${Math.floor(ts/60)}s`});
  if(!arr.length)arr.push({l:'ok',i:'✅',t:'Tüm Eşikler Geçildi'});
  document.getElementById('th-res').innerHTML=arr.map(a=>`<div class="alert-box ${a.l}">
    <span style="font-size:15px">${a.i}</span><div><div class="ab-title">${a.t}</div></div></div>`).join('');
}

function swT(el,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;
  document.getElementById('installBanner').style.display='flex';});
function installApp(){if(!dp)return;dp.prompt();dp.userChoice.then(()=>{dp=null;
  document.getElementById('installBanner').style.display='none';});}
</script>
