<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
  --bg:#f0f4f8;--white:#fff;--border:#dde3ec;
  --accent:#1a56a0;--accent2:#22c55e;--warn:#f59e0b;--danger:#ef4444;
  --purple:#8b5cf6;--teal:#14b8a6;--pink:#ec4899;
  --text:#1e293b;--muted:#64748b;--light:#f8fafc;
  --mono:'Space Mono',monospace;--body:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--body);display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:var(--accent);flex-shrink:0;box-shadow:0 2px 8px rgba(26,86,160,.3);}
.logo-icon{width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo h1{font-size:14px;font-weight:700;color:#fff;}
.logo span{font-size:9px;color:rgba(255,255,255,.7);display:block;}
.topbar-right{margin-left:auto;display:flex;gap:6px;}
.stat-pill{font-size:10px;padding:3px 9px;border-radius:20px;
  background:rgba(255,255,255,.15);color:#fff;font-weight:600;}

.layout{display:flex;flex:1;overflow:hidden;}

.sidebar{width:185px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:550px){.sidebar{width:125px;}}
.sidebar-head{padding:10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.btn-folder{display:flex;align-items:center;justify-content:center;gap:5px;
  background:var(--accent);color:#fff;font-weight:600;font-size:11px;
  padding:8px;border-radius:7px;cursor:pointer;border:none;width:100%;}
.btn-files{display:flex;align-items:center;justify-content:center;gap:5px;
  background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;
  padding:7px;border-radius:7px;cursor:pointer;width:100%;}
.btn-files:hover{border-color:var(--accent);color:var(--accent);}
input[type=file]{display:none;}
.file-list{flex:1;overflow-y:auto;padding:6px;}
.ov-item{padding:8px;border-radius:7px;cursor:pointer;margin-bottom:4px;
  background:var(--light);border-left:3px solid var(--accent);}
.ov-item:hover,.ov-item.active{background:#e8f0fb;}
.fi-label{font-size:10px;font-weight:600;color:var(--accent);}
.fi-sub{font-size:9px;color:var(--muted);margin-top:1px;}
.file-item{padding:7px 8px;border-radius:7px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}
.file-item:hover{background:var(--light);}
.file-item.active{background:#e8f0fb;border-color:rgba(26,86,160,.2);}
.fi-name{font-size:10px;font-weight:500;}
.fi-date{font-size:9px;color:var(--muted);margin-top:1px;}
.fi-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px;}

.main{flex:1;overflow-y:auto;padding:12px;background:var(--bg);}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;gap:12px;}
.welcome .big-icon{font-size:52px;opacity:.2;}
.welcome h2{font-size:16px;font-weight:600;color:var(--muted);}
.welcome p{font-size:12px;color:var(--muted);max-width:250px;line-height:1.6;}

.tabs{display:flex;gap:0;margin-bottom:12px;background:var(--white);
  border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.tab{padding:8px 10px;font-size:11px;font-weight:600;cursor:pointer;
  color:var(--muted);flex:1;text-align:center;border-right:1px solid var(--border);}
.tab:last-child{border-right:none;}
.tab.active{background:var(--accent);color:#fff;}
.tab-content{display:none;}
.tab-content.active{display:block;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.section{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:#fff;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:10px;}

.sum-table{width:100%;border-collapse:collapse;font-size:11px;}
.sum-table td{padding:6px 8px;border:1px solid var(--border);}
.sum-table td:nth-child(odd){background:var(--light);color:var(--muted);font-weight:500;width:42%;}
.sum-table td:nth-child(even){font-family:var(--mono);font-weight:600;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:7px;margin-bottom:10px;}
.stat-card{background:var(--light);border:1px solid var(--border);border-radius:8px;padding:9px 10px;
  position:relative;overflow:hidden;}
.sc-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sc-val{font-family:var(--mono);font-size:17px;font-weight:700;}
.sc-unit{font-size:9px;color:var(--muted);margin-top:1px;}
.stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.c-ok::before{background:var(--accent2);}
.c-warn::before{background:var(--warn);}
.c-danger::before{background:var(--danger);}
.c-blue::before{background:var(--accent);}

.cs{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.cs-head{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--light);}
.cs-avg{font-family:var(--mono);font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;}
.cs-body{padding:8px 10px 10px;}
.chart-wrap{position:relative;}
.chart-wrap.h120{height:120px;}
.chart-wrap.h140{height:140px;}
.chart-wrap.h160{height:160px;}

.alert{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:7px;
  margin-bottom:6px;border-left:3px solid;}
.alert.danger{background:#fef2f2;border-color:var(--danger);}
.alert.warn{background:#fffbeb;border-color:var(--warn);}
.alert.ok{background:#f0fdf4;border-color:var(--accent2);}
.a-title{font-size:11px;font-weight:600;}
.a-desc{font-size:10px;color:var(--muted);margin-top:1px;}

.daily-wrap{overflow-x:auto;}
.daily-table{width:100%;border-collapse:collapse;font-size:10px;min-width:340px;}
.daily-table th{padding:5px 6px;border:1px solid var(--border);background:var(--accent);
  color:#fff;font-size:9px;text-align:center;font-weight:600;}
.daily-table td{padding:4px 6px;border:1px solid var(--border);text-align:center;}
.daily-table tr.r-ok td{background:#f0fdf4;}
.daily-table tr.r-warn td{background:#fffbeb;}
.daily-table tr.r-danger td{background:#fef2f2;}
.daily-table tr.r-unused td{color:#bbb;background:var(--light);}

.rtable{width:100%;border-collapse:collapse;font-size:11px;}
.rtable th{padding:6px 8px;border:1px solid var(--border);background:var(--accent);color:#fff;font-size:9px;}
.rtable td{padding:6px 8px;border:1px solid var(--border);}
.rtable tr:nth-child(even) td{background:var(--light);}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;}
.b-ok{background:#dcfce7;color:#166534;}
.b-warn{background:#fef3c7;color:#92400e;}
.b-danger{background:#fee2e2;color:#991b1b;}
.b-info{background:#dbeafe;color:#1e40af;}

.th-box{background:var(--light);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.th-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.th-row label{font-size:11px;color:var(--muted);width:155px;}
.th-input{background:#fff;border:1px solid var(--border);color:var(--text);
  padding:5px 8px;border-radius:6px;font-family:var(--mono);font-size:11px;width:72px;outline:none;}
.th-input:focus{border-color:var(--accent);}
.btn-check{background:var(--accent);color:#fff;padding:7px 18px;border-radius:7px;
  cursor:pointer;font-size:11px;font-weight:600;border:none;margin-top:4px;}
.btn-print{background:var(--accent2);color:#fff;font-weight:700;font-size:11px;
  padding:8px 20px;border-radius:7px;border:none;cursor:pointer;margin-top:10px;width:100%;}

#installBanner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:var(--accent);padding:11px 14px;align-items:center;justify-content:space-between;}
.ib-btn{background:#fff;color:var(--accent);font-weight:700;padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:11px;}
.ib-skip{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:10px;}

@media print{
  .sidebar,.topbar,#installBanner,.tabs{display:none!important;}
  .layout{display:block;}
  .main{overflow:visible;padding:0;height:auto!important;}
  body{overflow:visible!important;height:auto!important;}
  html{overflow:visible!important;height:auto!important;}
  .tab-content{display:block!important;}
  /* Koyu renkli çıktı */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}
  .cs-head,.cs,.section,.sum-table td:nth-child(odd){background-color:#f0f4f8!important;}
  .sum-table td:nth-child(even){background-color:#fff!important;}
  .daily-table th{background-color:#1a56a0!important;color:#fff!important;}
  .daily-table tr.r-ok td{background-color:#dcfce7!important;}
  .daily-table tr.r-warn td{background-color:#fef3c7!important;}
  .daily-table tr.r-danger td{background-color:#fee2e2!important;}
  .daily-table tr.r-unused td{background-color:#f8fafc!important;}
  .b-ok{background-color:#dcfce7!important;color:#166534!important;}
  .b-warn{background-color:#fef3c7!important;color:#92400e!important;}
  .b-danger{background-color:#fee2e2!important;color:#991b1b!important;}
  .b-info{background-color:#dbeafe!important;color:#1e40af!important;}
  .alert.danger{background-color:#fee2e2!important;}
  .alert.warn{background-color:#fef3c7!important;}
  .alert.ok{background-color:#dcfce7!important;}
  .sec-label{-webkit-print-color-adjust:exact!important;}
  /* Sayfa ayarları */
  @page{margin:10mm;size:A4;}
}
</style>

<body>
<div class="topbar">
  <div class="logo-icon">🫁</div>
  <div class="logo"><h1>GOLDSLEP ANALİZ</h1><span>Detaylı Rapor</span></div>
  <div class="topbar-right">
    <div class="stat-pill" id="topCount">0 gün</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-head">
      <label class="btn-folder" for="folderInput">📁 Klasör Seç</label>
      <input type="file" id="folderInput" webkitdirectory multiple accept=".gsd">
      <label class="btn-files" for="filesInput">📄 Dosya Seç</label>
      <input type="file" id="filesInput" multiple accept=".gsd">
    </div>
    <div class="file-list" id="fileList">
      <div style="padding:20px 6px;text-align:center;color:var(--muted);font-size:10px;line-height:1.8;">
        GSD klasörünü seçin
      </div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="welcome">
      <div class="big-icon">🫁</div>
      <h2>Goldslep Detaylı Analiz</h2>
      <p>Sol taraftan <strong>Klasör Seç</strong> ile cihazdan kopyaladığınız GSD klasörünü seçin.</p>
    </div>
  </div>
</div>

<div id="installBanner">
  <div style="color:#fff"><div style="font-size:12px;font-weight:700;">📲 Ana Ekrana Ekle</div></div>
  <div style="display:flex;gap:6px;">
    <button class="ib-skip" onclick="document.getElementById('installBanner').style.display='none'">Sonra</button>
    <button class="ib-btn" onclick="installApp()">Kur</button>
  </div>
</div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let dayRecords = [];  // Her öğe = birleştirilmiş 1 gün
let activeIdx  = -2;
let charts     = {};

// ══════════════════════════════════════
// PARSE
// ══════════════════════════════════════
function parseGSD(text, filename){
  const d = { _filename: filename, _records: [] };
  text.split('\n').forEach(line => {
    line = line.trim();
    if(!line) return;
    if(line.startsWith('Record')){
      // Record 0| 02:46,period:7,event:4
      const m = line.match(/(\d+:\d+),period:(\d+),event:(\d+)/);
      if(m) d._records.push({ time: m[1], period: parseInt(m[2]), event: parseInt(m[3]) });
    } else {
      const eq = line.indexOf('=');
      if(eq > -1) d[line.slice(0,eq).trim()] = line.slice(eq+1).trim();
    }
  });
  return d;
}

function toMin(t){
  if(!t) return 0;
  const p = t.split(':');
  return parseInt(p[0]||0)*60 + parseInt(p[1]||0);
}
function fmtMin(m){
  const h = Math.floor(m/60), mn = Math.round(m%60);
  return h+'s '+(mn<10?'0':'')+mn+'dk';
}
function parseDate(s){
  if(!s) return 0;
  const p = s.split('.');
  return p.length===3 ? new Date(p[2],p[1]-1,p[0]).getTime() : 0;
}
function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

// ══════════════════════════════════════
// MERGE: aynı tarihteki oturumları birleştir
// Kopya dosyaları at (içerik aynıysa)
// ══════════════════════════════════════
function mergeByDate(rawList){
  // 1) Kopya içerikleri çıkar (Date+Sleep Time+Sleep Duration aynıysa tek tut)
  const seen = new Set();
  const unique = rawList.filter(r => {
    const key = (r['Date']||'')+'|'+(r['Sleep Time']||'')+'|'+(r['Sleep Duration']||'');
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // 2) Tarihe göre grupla
  const grouped = {};
  unique.forEach(r => {
    const date = r['Date'] || 'unknown';
    if(!grouped[date]) grouped[date] = [];
    grouped[date].push(r);
  });

  // 3) Her grup için birleştir
  const merged = [];
  Object.keys(grouped).forEach(date => {
    const sessions = grouped[date];
    if(sessions.length === 1){
      merged.push(buildDay(date, sessions));
    } else {
      // Birden fazla oturum: toplam süre, ağırlıklı kaçak, max AHI/AI
      merged.push(buildDay(date, sessions));
    }
  });

  // 4) Tarihe göre sırala
  merged.sort((a,b) => parseDate(a.date) - parseDate(b.date));
  return merged;
}

function buildDay(date, sessions){
  const totalMin = sessions.reduce((s,r) => s + toMin(r['Sleep Duration']), 0);

  // Ağırlıklı kaçak ortalaması (sadece 10 dk ve üzeri oturumlar - kısa deneme oturumları hariç)
  let weightedLeak = 0, leakTotalMin = 0;
  sessions.forEach(r => {
    const m = toMin(r['Sleep Duration']);
    const leak = parseFloat(r['Leak']||0);
    if(m >= 10){ weightedLeak += leak * m; leakTotalMin += m; }
  });
  // Hiç 10 dk üzeri oturum yoksa en uzun oturumu kullan
  if(leakTotalMin === 0){
    const longest = sessions.reduce((a,b) => toMin(a['Sleep Duration']) >= toMin(b['Sleep Duration']) ? a : b);
    const lm = toMin(longest['Sleep Duration']);
    weightedLeak = parseFloat(longest['Leak']||0) * (lm||1);
    leakTotalMin = lm || 1;
  }
  const avgLeak = Math.round(weightedLeak / leakTotalMin * 10) / 10;

  // AHI/AI: süreye göre ağırlıklı
  let wAHI = 0, wAI = 0;
  sessions.forEach(r => {
    const m = toMin(r['Sleep Duration']);
    wAHI += parseFloat(r['AHI']||0) * m;
    wAI  += parseFloat(r['AI']||0)  * m;
  });
  const dayAHI = totalMin > 0 ? wAHI / totalMin : 0;
  const dayAI  = totalMin > 0 ? wAI  / totalMin : 0;

  // İlk oturum bilgilerini temel al
  const base = sessions[0];
  const allRecords = sessions.flatMap(s => s._records||[]);

  return {
    date,
    mode:        base['Therapy Mode'] || 'CPAP',
    epap:        parseFloat(base['EPAP']||0),
    ipap:        parseFloat(base['IPAP']||0),
    sleepTime:   sessions[0]['Sleep Time'] || '—',
    wakeTime:    sessions[sessions.length-1]['Wakeup Time'] || '—',
    totalMin,
    ahi:         Math.round(dayAHI * 100) / 100,
    ai:          Math.round(dayAI  * 100) / 100,
    leak:        Math.round(avgLeak * 10) / 10,
    serino:      base['serino'] || '—',
    sessions:    sessions.length,
    events:      allRecords,
  };
}

// ══════════════════════════════════════
// FILE INPUT
// ══════════════════════════════════════
document.getElementById('folderInput').addEventListener('change', handleFiles);
document.getElementById('filesInput').addEventListener('change', handleFiles);

function handleFiles(e){
  const files = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith('.gsd'));
  if(!files.length){ alert('GSD dosyası bulunamadı.'); return; }
  let done = 0;
  const rawList = [];
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      rawList.push(parseGSD(ev.target.result, file.name));
      if(++done === files.length){
        dayRecords = mergeByDate(rawList);
        document.getElementById('topCount').textContent = dayRecords.length + ' gün';
        renderSidebar();
        showOverview();
      }
    };
    reader.readAsText(file);
  });
  e.target.value = '';
}

// ══════════════════════════════════════
// STATUS
// ══════════════════════════════════════
function getStatus(day){
  if(day.leak > 24 || day.ahi > 5) return { dot:'#ef4444', level:'danger' };
  if(day.leak > 15 || day.ahi > 2) return { dot:'#f59e0b', level:'warn' };
  if(day.totalMin === 0)            return { dot:'#cbd5e1', level:'unused' };
  return { dot:'#22c55e', level:'ok' };
}

// ══════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════
function renderSidebar(){
  const list = document.getElementById('fileList');
  let html = `<div class="ov-item ${activeIdx===-1?'active':''}" onclick="showOverview()">
    <div class="fi-label">📊 Genel Bakış</div>
    <div class="fi-sub">${dayRecords.length} gün · Tüm dönem</div>
  </div>`;
  html += dayRecords.map((d,i) => {
    const s = getStatus(d);
    return `<div class="file-item ${activeIdx===i?'active':''}" onclick="selectDay(${i})">
      <div class="fi-name"><span class="fi-dot" style="background:${s.dot}"></span>${d.date}</div>
      <div class="fi-date">${d.mode} · AHI:${d.ahi} · ${fmtMin(d.totalMin)}</div>
    </div>`;
  }).join('');
  list.innerHTML = html;
}

// ══════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════
function showOverview(){
  activeIdx = -1; renderSidebar();
  const main = document.getElementById('main');
  if(!dayRecords.length) return;

  const dates     = dayRecords.map(d => d.date);
  const ahiArr    = dayRecords.map(d => d.ahi);
  const aiArr     = dayRecords.map(d => d.ai);
  const leakArr   = dayRecords.map(d => d.leak);
  const sleepArr  = dayRecords.map(d => d.totalMin);
  const epapArr   = dayRecords.map(d => d.epap);

  const totalDays  = dayRecords.length;
  const usedDays   = dayRecords.filter(d => d.totalMin > 0).length;
  const unusedDays = totalDays - usedDays;
  const above4     = dayRecords.filter(d => d.totalMin >= 240).length;
  const below4     = dayRecords.filter(d => d.totalMin > 0 && d.totalMin < 240).length;
  const usedOnly   = sleepArr.filter(m => m > 0);
  const avgUsedMin = avg(usedOnly);
  const totalMin   = sleepArr.reduce((a,b)=>a+b,0);
  const minUse     = usedOnly.length ? Math.min(...usedOnly) : 0;
  const maxUse     = usedOnly.length ? Math.max(...usedOnly) : 0;

  // Ağırlıklı ortalama kaçak (sadece 30 dk ve uzeri gunler - kisa denemeler haric)
  let wLeak = 0, wTotal = 0;
  dayRecords.forEach(d => { if(d.totalMin >= 30){ wLeak += d.leak * d.totalMin; wTotal += d.totalMin; }});
  const avgLeak = wTotal > 0 ? Math.round(wLeak/wTotal*10)/10 : 0;

  // Ağırlıklı AHI
  let wAHI = 0;
  dayRecords.forEach(d => { if(d.totalMin > 0){ wAHI += d.ahi * d.totalMin; }});
  const avgAHI = wTotal > 0 ? Math.round(wAHI/wTotal*100)/100 : 0;

  const critDays = dayRecords.filter(d => d.leak > 24 || d.ahi > 5).length;
  const firstDate = dayRecords[0].date;

function drawBarChart(id, labels, data, color, cg, ct, ymin, ymax, threshold){
  const ctx = document.getElementById(id); if(!ctx) return;
  if(charts[id]) charts[id].destroy();
  const ds = [{
    data, borderRadius:3, borderSkipped:false,
    backgroundColor: data.map(v => threshold && v > threshold ? 'rgba(239,68,68,.7)' : color)
  }];
  if(threshold) ds.push({type:'line',data:data.map(()=>threshold),
    borderColor:'rgba(239,68,68,.4)',borderDash:[4,3],borderWidth:1,pointRadius:0,fill:false});
  charts[id] = new Chart(ctx, {type:'bar', data:{labels, datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:ct,font:{size:8},maxRotation:45},grid:{color:cg}},
        y:{min:ymin,max:ymax||undefined,ticks:{color:ct,font:{size:9}},grid:{color:cg}}}}});
}

function drawLeakChart(id, labels, data, cg, ct){
  const ctx = document.getElementById(id); if(!ctx) return;
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(ctx, {type:'bar', data:{labels, datasets:[
    {data, borderRadius:3, borderSkipped:false,
      backgroundColor: data.map(v => v>24?'rgba(239,68,68,.7)':v>15?'rgba(245,158,11,.7)':'rgba(236,72,153,.7)')},
    {type:'line',data:data.map(()=>24),borderColor:'rgba(239,68,68,.4)',
      borderDash:[4,3],borderWidth:1,pointRadius:0,fill:false}
  ]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:ct,font:{size:8},maxRotation:45},grid:{color:cg}},
      y:{ticks:{color:ct,font:{size:9}},grid:{color:cg}}}}});
}

function drawUsageChart(id, labels, data, cg, ct){
  const ctx = document.getElementById(id); if(!ctx) return;
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(ctx, {type:'bar', data:{labels,
    datasets:[{data: data.map(m => +(m/60).toFixed(2)), borderRadius:3, borderSkipped:false,
      backgroundColor: data.map(m => m===0?'rgba(203,213,225,.4)':m>=240?'rgba(34,197,94,.7)':'rgba(239,68,68,.7)')}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:ct,font:{size:8},maxRotation:45},grid:{color:cg}},
        y:{ticks:{color:ct,font:{size:9},callback:v=>v+'s'},grid:{color:cg}}}}});
}

function buildOvAlerts(avgLeak, avgAHI, below4, critDays){
  const el = document.getElementById('ov-alerts'); if(!el) return;
  const arr = [];
  if(avgLeak > 24) arr.push({l:'danger',i:'🚨',t:`Ort. Kaçak Kritik: ${avgLeak} L/dk`,d:'Maske uyumunu kontrol edin.'});
  else if(avgLeak > 15) arr.push({l:'warn',i:'⚠️',t:`Ort. Kaçak Yüksek: ${avgLeak} L/dk`,d:'Maske pozisyonuna dikkat edin.'});
  if(avgAHI > 5) arr.push({l:'danger',i:'🚨',t:`Ort. AHI Yüksek: ${avgAHI}`,d:'Klinisyene danışın.'});
  if(critDays > 0) arr.push({l:'danger',i:'🚨',t:`${critDays} kritik gece tespit edildi`,d:'Detay için günlük tabloya bakın.'});
  if(below4 > 3) arr.push({l:'warn',i:'⚠️',t:`${below4} gecede kullanım 4 saatin altında`,d:'Günlük min. 4 saat önerilir.'});
  if(!arr.length) arr.push({l:'ok',i:'✅',t:'Dönem Geneli Normal',d:'Kritik uyarı tespit edilmedi.'});
  el.innerHTML = arr.map(a=>`<div class="alert ${a.l}">
    <span style="font-size:17px">${a.i}</span>
    <div><div class="a-title">${a.t}</div><div class="a-desc">${a.d}</div></div>
  </div>`).join('');
}

      datasets:[{data:[d.epap,d.ipap],backgroundColor:['rgba(26,86,160,.7)','rgba(26,86,160,.4)'],borderRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:ct,font:{size:10}},grid:{color:cg}},y:{min:0,max:20,ticks:{color:ct,font:{size:9}},grid:{color:cg}}}}});}
  const ac=document.getElementById('dg-ahi');
  if(ac){if(charts['dg-ahi'])charts['dg-ahi'].destroy();
    charts['dg-ahi']=new Chart(ac,{type:'bar',data:{labels:['AHI','AI'],
      datasets:[{data:[d.ahi,d.ai],backgroundColor:[d.ahi>5?'rgba(239,68,68,.7)':'rgba(99,102,241,.7)',d.ai>5?'rgba(239,68,68,.7)':'rgba(99,102,241,.4)'],borderRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:ct},grid:{color:cg}},y:{ticks:{color:ct,font:{size:9}},grid:{color:cg}}}}});}
  const lc=document.getElementById('dg-l');
  if(lc){if(charts['dg-l'])charts['dg-l'].destroy();
    charts['dg-l']=new Chart(lc,{type:'bar',data:{labels:['Kaçak'],
      datasets:[{data:[d.leak],backgroundColor:[d.leak>24?'rgba(239,68,68,.7)':d.leak>15?'rgba(245,158,11,.7)':'rgba(236,72,153,.7)'],borderRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:ct},grid:{color:cg}},y:{ticks:{color:ct,font:{size:9}},grid:{color:cg}}}}});}
}

function rRow(p,v,ref,s){
  const b=s==='ok'?'<span class="badge b-ok">Normal</span>':s==='warn'?'<span class="badge b-warn">Dikkat</span>':
    s==='danger'?'<span class="badge b-danger">Kritik</span>':'<span class="badge b-info">Bilgi</span>';
  return`<tr><td>${p}</td><td style="font-family:var(--mono)">${v}</td><td style="color:var(--muted)">${ref}</td><td>${b}</td></tr>`;
}

function runTh(idx){
  const d=dayRecords[idx];
  const tl=parseFloat(document.getElementById('th-leak').value)||24;
  const ta=parseFloat(document.getElementById('th-ahi').value)||5;
  const ti=parseFloat(document.getElementById('th-ai').value)||5;
  const ts=parseFloat(document.getElementById('th-sleep').value)||240;
  const arr=[];
  if(d.leak>tl) arr.push({l:'danger',i:'🚨',t:`Kaçak Eşik Aşıldı: ${d.leak} > ${tl} L/dk`});
  if(d.ahi>ta)  arr.push({l:'danger',i:'🚨',t:`AHI Eşik Aşıldı: ${d.ahi} > ${ta}`});
  if(d.ai>ti)   arr.push({l:'danger',i:'🚨',t:`AI Eşik Aşıldı: ${d.ai} > ${ti}`});
  if(d.totalMin<ts&&d.totalMin>0) arr.push({l:'warn',i:'⚠️',t:`Uyku Kısa: ${fmtMin(d.totalMin)}`});
  if(!arr.length) arr.push({l:'ok',i:'✅',t:'Tüm Eşikler Geçildi'});
  document.getElementById('th-res').innerHTML=arr.map(a=>`<div class="alert ${a.l}">
    <span style="font-size:17px">${a.i}</span><div><div class="a-title">${a.t}</div></div></div>`).join('');
}

function swTab(el,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════════
// PRINT - tüm içeriği göster
// ══════════════════════════════════════
function printAll(){
  // Tüm tab-content'leri geçici olarak görünür yap
  const tabs = document.querySelectorAll('.tab-content');
  const hidden = [];
  tabs.forEach(t => {
    if(!t.classList.contains('active')){
      hidden.push(t);
      t.style.display = 'block';
    }
  });
  window.print();
  // Geri al
  hidden.forEach(t => { t.style.display = ''; });
}

window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;
  document.getElementById('installBanner').style.display='flex';});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBanner').style.display='none';});}
