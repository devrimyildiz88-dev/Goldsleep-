<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Goldslep Analiz</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1464a0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Goldslep">
<!-- jsPDF + AutoTable -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --blu:#1464a0;--yel:#e8970a;--grn:#2a7d2a;--red:#c0392b;
  --pink:#be185d;--ind:#4338ca;--gray:#475569;
  --bg:#eceff4;--whi:#fff;--bor:#c8d0dc;--mut:#6b7a8d;--txt:#1a1a2e;
  --f:Arial,Helvetica,'Helvetica Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--txt);font-family:var(--f);display:flex;flex-direction:column;font-size:12px;}

/* TOPBAR */
.tb{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--blu);flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.tbi{width:28px;height:28px;border-radius:5px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:15px;}
.tbt{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px;}
.tbs{font-size:8px;color:rgba(255,255,255,.6);letter-spacing:.8px;display:block;}
.tbr{margin-left:auto;}
.pill{font-size:10px;padding:3px 9px;border-radius:10px;background:rgba(255,255,255,.18);color:#fff;font-weight:700;}

.lay{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sb{width:172px;flex-shrink:0;background:var(--whi);border-right:1px solid var(--bor);display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:540px){.sb{width:112px;}}
.sbh{padding:8px;border-bottom:1px solid var(--bor);display:flex;flex-direction:column;gap:5px;}
.bp{display:flex;align-items:center;justify-content:center;gap:4px;background:var(--blu);color:#fff;font-weight:700;font-size:10px;padding:7px;border-radius:5px;cursor:pointer;border:none;width:100%;}
.bs{display:flex;align-items:center;justify-content:center;gap:4px;background:transparent;border:1px solid var(--bor);color:var(--mut);font-size:10px;padding:6px;border-radius:5px;cursor:pointer;width:100%;}
.bs:hover{border-color:var(--blu);color:var(--blu);}
input[type=file]{display:none;}
.fl{flex:1;overflow-y:auto;padding:5px;}
.fl::-webkit-scrollbar{width:3px;}
.fl::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px;}
.oi{padding:7px;border-radius:5px;cursor:pointer;margin-bottom:3px;background:#f4f6fa;border-left:3px solid var(--blu);}
.oi:hover,.oi.a{background:#dce8f5;}
.oil{font-size:10px;font-weight:700;color:var(--blu);}
.ois{font-size:9px;color:var(--mut);margin-top:1px;}
.fi{padding:6px 7px;border-radius:5px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}
.fi:hover{background:#f4f6fa;}
.fi.a{background:#dce8f5;border-color:rgba(20,100,160,.2);}
.fin{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fim{font-size:9px;color:var(--mut);margin-top:1px;}
.fd{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:10px;background:var(--bg);}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px;}
.wlc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:10px;}
.wlc-i{font-size:46px;opacity:.15;}
.wlc h2{font-size:15px;font-weight:700;color:var(--mut);}
.wlc p{font-size:11px;color:var(--mut);max-width:210px;line-height:1.65;}

/* TABS */
.tabs{display:flex;background:var(--whi);border:1px solid var(--bor);border-radius:6px;overflow:hidden;margin-bottom:9px;}
.tab{padding:6px 10px;font-size:10px;font-weight:700;cursor:pointer;color:var(--mut);flex:1;text-align:center;border-right:1px solid var(--bor);}
.tab:last-child{border-right:none;}
.tab.a{background:var(--blu);color:#fff;}
.tp{display:none;}
.tp.a{display:block;animation:fu .2s ease;}
@keyframes fu{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* CHART CARD */
.cc{background:var(--whi);border:1px solid var(--bor);border-radius:7px;margin-bottom:7px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.cch{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;}
.ccl{font-size:8px;font-weight:700;color:#fff;padding:2px 7px;border-radius:3px;}
.cca{display:flex;align-items:center;gap:5px;}
.ccav{font-size:9px;font-weight:700;color:#fff;padding:1px 6px;border-radius:3px;}
.ccal{font-size:8px;color:var(--mut);}
.ccb{padding:4px 6px 6px;}
.cw{position:relative;}
.cw.h88{height:88px;} .cw.h95{height:95px;} .cw.h105{height:105px;}

/* SUMMARY */
.so{background:var(--whi);border:1px solid var(--bor);border-radius:7px;margin-bottom:7px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.so-bar{background:var(--blu);color:#fff;font-size:9px;font-weight:700;padding:4px 9px;letter-spacing:.4px;}
.so-g{display:grid;grid-template-columns:1fr 1fr;}
.so-r{display:flex;justify-content:space-between;align-items:center;padding:4px 9px;border-bottom:1px solid var(--bor);border-right:1px solid var(--bor);}
.so-r:nth-child(even){border-right:none;}
.so-r:nth-last-child(-n+2){border-bottom:none;}
.so-l{font-size:9px;color:var(--mut);font-weight:600;}
.so-v{font-size:9px;font-weight:700;}

/* ALERTS */
.al{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border-radius:6px;margin-bottom:5px;border-left:3px solid;}
.al.d{background:#fdf2f2;border-color:var(--red);}
.al.w{background:#fdfbf0;border-color:var(--yel);}
.al.o{background:#f0fdf4;border-color:var(--grn);}
.alt{font-size:10px;font-weight:700;}
.ald{font-size:9px;color:var(--mut);margin-top:1px;}

/* DAILY TABLE */
.dtw{overflow-x:auto;}
.dt{width:100%;border-collapse:collapse;font-size:9px;}
.dt th{padding:4px 5px;background:var(--blu);color:#fff;text-align:center;font-weight:700;}
.dt td{padding:3px 5px;border:1px solid var(--bor);text-align:center;}
.dt tr.ok td{background:#f0fdf4;}
.dt tr.wn td{background:#fef9e7;}
.dt tr.dn td{background:#fdf2f2;}
.dt tr.un td{color:#aaa;background:#f8fafc;}

/* INFO */
.ih{background:var(--whi);border:1px solid var(--bor);border-radius:7px;padding:9px;margin-bottom:7px;}
.ihd{height:2px;background:linear-gradient(90deg,var(--blu),var(--yel),var(--blu));border-radius:1px;margin:5px 0;}
.ibb{display:flex;gap:5px;flex-wrap:wrap;}
.bdg{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;color:#fff;}

/* PDF PROGRESS */
.prog{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.prog.show{display:flex;}
.prog-box{background:#fff;border-radius:10px;padding:24px 32px;text-align:center;min-width:220px;}
.prog-title{font-size:14px;font-weight:700;color:var(--blu);margin-bottom:8px;}
.prog-bar{width:100%;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blu);border-radius:3px;transition:width .3s;}
.prog-msg{font-size:11px;color:var(--mut);margin-top:6px;}

#ib{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:var(--blu);padding:10px 14px;align-items:center;justify-content:space-between;}
.ibo{background:#fff;color:var(--blu);font-weight:700;padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:10px;}
.ibn{background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:9px;}
</style>
</head>
<body>

<div class="tb">
  <div class="tbi">🫁</div>
  <div><div class="tbt">GOLD<span style="color:#fbbf24">SLEEP</span></div><span class="tbs">ANALİZ SİSTEMİ</span></div>
  <div class="tbr"><div class="pill" id="topC">0 gün</div></div>
</div>

<div class="lay">
  <div class="sb">
    <div class="sbh">
      <label class="bp" for="fIn">📁 Klasör Seç</label>
      <input type="file" id="fIn" webkitdirectory multiple accept=".gsd">
      <label class="bs" for="fIn2">📄 Dosya Seç</label>
      <input type="file" id="fIn2" multiple accept=".gsd">
    </div>
    <div class="fl" id="FL">
      <div style="padding:16px 6px;text-align:center;color:var(--mut);font-size:9px;line-height:1.9;">GSD klasörünü<br>seçin</div>
    </div>
  </div>
  <div class="main" id="MN">
    <div class="wlc">
      <div class="wlc-i">🫁</div>
      <h2>Goldslep Detaylı Analiz</h2>
      <p>Sol taraftan <strong>Klasör Seç</strong> ile cihazdan kopyaladığınız GSD klasörünü seçin.</p>
    </div>
  </div>
</div>

<!-- PDF Progress -->
<div class="prog" id="progOverlay">
  <div class="prog-box">
    <div class="prog-title">🫁 PDF Oluşturuluyor</div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-msg" id="progMsg">Hazırlanıyor...</div>
  </div>
</div>

<div id="ib">
  <div style="color:#fff"><div style="font-size:11px;font-weight:700;">📲 Ana Ekrana Ekle</div></div>
  <div style="display:flex;gap:5px;">
    <button class="ibn" onclick="document.getElementById('ib').style.display='none'">Sonra</button>
    <button class="ibo" onclick="installApp()">Kur</button>
  </div>
</div>

<script>
'use strict';
// ════════════ HELPERS ════════════
let DR=[], AI=-2, CH={};
const toM=t=>{if(!t)return 0;const p=t.split(':');return+p[0]*60+(+p[1]||0);};
const fM=m=>{const h=Math.floor(m/60),n=Math.round(m%60);return h+'s'+(n<10?'0':'')+n+'dk';};
const fH=m=>{const h=Math.floor(m/60),n=Math.round(m%60);return h+' Saat'+(n>0?' '+n+' Dakika':'');};
const pD=s=>{if(!s)return 0;try{const p=s.split('.');return new Date(+p[2],+p[1]-1,+p[0]).getTime();}catch{return 0;}};
const mean=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
const med=a=>{if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
const now=()=>new Date().toLocaleDateString('tr-TR');
const sD=s=>{if(!s)return'';const p=s.split('.');return p.length>=2?p[0]+'.'+p[1]:'';};
const r2=v=>Math.round(v*100)/100;
const r1=v=>Math.round(v*10)/10;

// ════════════ PARSE ════════════
function parseG(txt){
  const d={};
  txt.split('\n').forEach(l=>{l=l.trim();if(!l)return;const eq=l.indexOf('=');if(eq>-1)d[l.slice(0,eq).trim()]=l.slice(eq+1).trim();});
  return d;
}

// ════════════ MERGE ════════════
function merge(raw){
  const seen=new Set();
  const uniq=raw.filter(r=>{const k=(r['Date']||'')+'|'+(r['Sleep Time']||'')+'|'+(r['Sleep Duration']||'');if(seen.has(k))return false;seen.add(k);return true;});
  const grp={};
  uniq.forEach(r=>{const d=r['Date']||'?';if(!grp[d])grp[d]=[];grp[d].push(r);});
  const out=[];
  Object.keys(grp).forEach(date=>{
    const ss=grp[date];
    const tm=ss.reduce((s,r)=>s+toM(r['Sleep Duration']),0);
    const vl=ss.filter(r=>toM(r['Sleep Duration'])>=180).map(r=>parseFloat(r['Leak']||0)/100);
    const leak=vl.length?r2(med(vl)):0;
    let wA=0,wI=0,wT=0;
    ss.forEach(r=>{const m=toM(r['Sleep Duration']);wA+=parseFloat(r['AHI']||0)*m;wI+=parseFloat(r['AI']||0)*m;wT+=m;});
    const b=ss[0];
    out.push({date,mode:b['Therapy Mode']||'CPAP',epap:parseFloat(b['EPAP']||0),ipap:parseFloat(b['IPAP']||0),
      sleepT:ss[0]['Sleep Time']||'—',wakeT:ss[ss.length-1]['Wakeup Time']||'—',
      totalMin:tm,ahi:wT?r2(wA/wT):0,ai:wT?r2(wI/wT):0,leak,
      serino:b['serino']||'—',weight:b['Patient Weight']||'—',sessions:ss.length});
  });
  out.sort((a,b)=>pD(a.date)-pD(b.date));
  return out;
}

// ════════════ STATS ════════════
function calcS(){
  const tm=DR.filter(d=>d.totalMin>0).map(d=>d.totalMin);
  let wL=0,wA=0,wI=0,wT=0;
  DR.forEach(d=>{if(d.totalMin>=30){wL+=d.leak*d.totalMin;wA+=d.ahi*d.totalMin;wI+=d.ai*d.totalMin;wT+=d.totalMin;}});
  return{total:DR.length,used:tm.length,unused:DR.length-tm.length,
    above4:DR.filter(d=>d.totalMin>=240).length,below4:DR.filter(d=>d.totalMin>0&&d.totalMin<240).length,
    avgU:mean(tm),totalMin:DR.map(d=>d.totalMin).reduce((a,b)=>a+b,0),
    minU:tm.length?Math.min(...tm):0,maxU:tm.length?Math.max(...tm):0,
    avgLeak:wT?r1(wL/wT):0,avgAHI:wT?r2(wA/wT):0,avgAI:wT?r2(wI/wT):0,
    crit:DR.filter(d=>d.leak>24||d.ahi>5).length,
    first:DR[0].date,last:DR[DR.length-1].date,
    serino:DR[0].serino,mode:DR[0].mode,epap:DR[0].epap,weight:DR[0].weight};
}

// ════════════ FILE INPUT ════════════
document.getElementById('fIn').addEventListener('change',hF);
document.getElementById('fIn2').addEventListener('change',hF);
function hF(e){
  const files=Array.from(e.target.files).filter(f=>f.name.toLowerCase().endsWith('.gsd'));
  if(!files.length){alert('GSD dosyası bulunamadı.');return;}
  let done=0;const raw=[];
  files.forEach(f=>{const r=new FileReader();r.onload=ev=>{raw.push(parseG(ev.target.result));if(++done===files.length){DR=merge(raw);document.getElementById('topC').textContent=DR.length+' gün';renderSB();showOV();}};r.readAsText(f);});
  e.target.value='';
}

// ════════════ STATUS ════════════
const stOf=d=>d.leak>24||d.ahi>5?'dn':d.leak>15||d.ahi>2?'wn':d.totalMin===0?'un':'ok';
const stC=s=>s==='dn'?'#c0392b':s==='wn'?'#e8970a':s==='un'?'#9ca3af':'#2a7d2a';

// ════════════ SIDEBAR ════════════
function renderSB(){
  const L=document.getElementById('FL');
  let h=`<div class="oi ${AI===-1?'a':''}" onclick="showOV()"><div class="oil">📊 Genel Bakış</div><div class="ois">${DR.length} gün · Tüm dönem</div></div>`;
  h+=DR.map((d,i)=>`<div class="fi ${AI===i?'a':''}" onclick="selD(${i})"><div class="fin"><span class="fd" style="background:${stC(stOf(d))}"></span>${d.date}</div><div class="fim">${d.mode}·AHI:${d.ahi}·${fM(d.totalMin)}</div></div>`).join('');
  L.innerHTML=h;
}

// ════════════ CHART (screen) ════════════
const CG='rgba(140,156,172,.18)',CT='#5a6a7a';
function mkBar(id,labels,data,cFn,yMin=0,yMax,refLine){
  const ctx=document.getElementById(id);if(!ctx)return;
  if(CH[id])CH[id].destroy();
  const R=Math.ceil(window.devicePixelRatio||2);
  // offsetWidth 0 ise üst elementlerde ara
  let pw=ctx.parentElement.offsetWidth,ph=ctx.parentElement.offsetHeight;
  if(!pw){let el=ctx.parentElement;while(el&&!pw){pw=el.offsetWidth;el=el.parentElement;}}
  if(!pw)pw=300;if(!ph)ph=88;
  ctx.width=pw*R;ctx.height=ph*R;ctx.style.width='100%';ctx.style.height='100%';
  const ds=[{data,borderRadius:2,borderSkipped:false,backgroundColor:data.map((v,i)=>cFn(v,i)),barPercentage:.7,categoryPercentage:.8}];
  if(refLine!==undefined)ds.push({type:'line',data:data.map(()=>refLine),borderColor:'rgba(192,57,43,.5)',borderDash:[5,3],borderWidth:1.5,pointRadius:0,fill:false,tension:0,order:0});
  CH[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:ds},options:{responsive:false,maintainAspectRatio:false,devicePixelRatio:R,plugins:{legend:{display:false}},animation:{duration:0},
    scales:{x:{ticks:{color:CT,font:{size:7.5,family:'Arial,Helvetica,sans-serif'},maxRotation:45,minRotation:45,autoSkip:true,maxTicksLimit:13},grid:{color:CG}},
      y:{min:yMin,max:yMax||undefined,ticks:{color:CT,font:{size:8,family:'Arial,Helvetica,sans-serif'}},grid:{color:CG}}}}});
}

function CS(id,bgH,lBg,title,a1l,a1bg,a1v,a2l,a2bg,a2v,hc){
  return`<div class="cc"><div class="cch" style="background:${bgH}"><span class="ccl" style="background:${lBg}">${title}</span><div class="cca">${a1l?`<span class="ccal">${a1l}</span><span class="ccav" style="background:${a1bg}">${a1v}</span>`:''} ${a2l?`<span class="ccal">${a2l}</span><span class="ccav" style="background:${a2bg}">${a2v}</span>`:''}</div></div><div class="ccb"><div class="cw ${hc}"><canvas id="${id}"></canvas></div></div></div>`;
}

// ════════════ OVERVIEW ════════════
function showOV(){
  AI=-1;renderSB();if(!DR.length)return;
  const s=calcS();
  const ahiC=s.avgAHI>5?'var(--red)':s.avgAHI>2?'var(--yel)':'var(--grn)';
  const lkC=s.avgLeak>24?'var(--red)':s.avgLeak>15?'var(--yel)':'var(--grn)';
  document.getElementById('MN').innerHTML=`<div style="animation:fu .3s ease">
  <div class="ih">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
      <div style="display:flex;align-items:center;gap:7px"><span style="font-size:19px">🫁</span>
        <div><div style="font-size:17px;font-weight:900;letter-spacing:.5px"><span style="color:#1464a0">GOLD</span><span style="color:#e8970a">SLEEP</span></div>
        <div style="font-size:8px;color:var(--mut);letter-spacing:.8px">UYKU TEDAVİ SİSTEMİ</div></div>
      </div>
      <div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--blu)">DETAYLI RAPOR</div><div style="font-size:9px;color:var(--mut)">${now()}</div></div>
    </div>
    <div class="ihd"></div>
    <div class="ibb">
      <span class="bdg" style="background:#1464a0">📅 ${s.first} — ${s.last}</span>
      <span class="bdg" style="background:#e8970a">🔑 ${s.serino}</span>
      <span class="bdg" style="background:#475569">💊 ${s.mode} · EPAP:${s.epap}</span>
    </div>
  </div>
  <div class="so"><div class="so-bar">ÖZET KULLANIM RAPORU</div><div class="so-g">
    <div class="so-r"><span class="so-l">Toplam Gün</span><span class="so-v">${s.total} Gün</span></div>
    <div class="so-r"><span class="so-l">Kullanılmayan Günler</span><span class="so-v">${s.unused} Gün</span></div>
    <div class="so-r"><span class="so-l">Kullanılan Günler</span><span class="so-v">${s.used} Gün</span></div>
    <div class="so-r"><span class="so-l">Ort. 4 Saat Altı</span><span class="so-v">${s.below4} Gün</span></div>
    <div class="so-r"><span class="so-l">Ort. 4 Saat Üstü</span><span class="so-v">${s.above4} Gün</span></div>
    <div class="so-r"><span class="so-l">Kull. Gün Ort. Saat</span><span class="so-v">${fH(s.avgU)}</span></div>
    <div class="so-r"><span class="so-l">Toplam Kullanım</span><span class="so-v">${fH(s.totalMin)}</span></div>
    <div class="so-r"><span class="so-l">1 Günde Min Kullanım</span><span class="so-v">${s.minU?fM(s.minU):'—'}</span></div>
    <div class="so-r"><span class="so-l">Tüm Günler Ort. Saat</span><span class="so-v">${fM(s.totalMin/s.total)}</span></div>
    <div class="so-r"><span class="so-l">1 Günde Max Kullanım</span><span class="so-v">${fM(s.maxU)}</span></div>

    mkBar('cAHI',dates,DR.map(d=>d.ahi),v=>v>5?'rgba(192,57,43,.9)':'rgba(67,56,202,.78)',0,null,5);

function buildAlerts(s){
  const el=document.getElementById('alts');if(!el)return;
  const arr=[];
  if(s.avgLeak>24)arr.push({l:'d',i:'🚨',t:`Ort. Kaçak Kritik: ${s.avgLeak} L/dk`,d:'Maske uyumunu kontrol edin.'});
  else if(s.avgLeak>15)arr.push({l:'w',i:'⚠️',t:`Ort. Kaçak Yüksek: ${s.avgLeak} L/dk`,d:'Maske pozisyonuna dikkat.'});
  if(s.avgAHI>5)arr.push({l:'d',i:'🚨',t:`Ort. AHI Yüksek: ${s.avgAHI}`,d:'Klinisyene danışın.'});
  if(s.crit>0)arr.push({l:'d',i:'🚨',t:`${s.crit} kritik gece tespit edildi`,d:'Günlük tabloyu inceleyin.'});
  if(s.below4>3)arr.push({l:'w',i:'⚠️',t:`${s.below4} gecede 4 saat altı kullanım`,d:'Min. 4 saat önerilir.'});
  if(!arr.length)arr.push({l:'o',i:'✅',t:'Dönem Geneli Normal',d:'Kritik uyarı tespit edilmedi.'});
  el.innerHTML=arr.map(a=>`<div class="al ${a.l}"><span style="font-size:15px">${a.i}</span><div><div class="alt">${a.t}</div><div class="ald">${a.d}</div></div></div>`).join('');
}

// ════════════════════════════════════════════════
// PDF ÜRETİMİ — jsPDF ile birebir Goldslep formatı
// ════════════════════════════════════════════════
async function doPDF(){
  if(!DR.length){alert('Önce GSD dosyası yükleyin.');return;}
  const s=calcS();
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=210,PH=297,ML=14,MR=14,MT=10,MB=8,CW=182;
  try{
  setProgress(0,'Başlatılıyor...');
  // Yardımcı kısaltmalar (global scope'tan al, yoksa tanımla)
  const _fM=typeof fM!=='undefined'?fM:m=>{const h=Math.floor(m/60),n=Math.round(m%60);return h+'s'+(n<10?'0':'')+n+'dk';};
  const _fH=typeof fH!=='undefined'?fH:m=>{const h=Math.floor(m/60),n=Math.round(m%60);return h+' Saat'+(n>0?' '+n+' Dakika':'');};
  const _sD=typeof sD!=='undefined'?sD:s=>{const p=s.split('.');return p.length>=2?p[0]+'.'+p[1]:s;};

  // ─── RENK YARDIMCILARI ───
  const setBG=col=>doc.setFillColor(...hexRGB(col));
  const setTXT=col=>doc.setTextColor(...hexRGB(col));
  const setSTR=col=>doc.setDrawColor(...hexRGB(col));
  function hexRGB(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}

  // Türkçe karakterleri PDF helvetica için ASCII'ye çevir
  function tr(s){
    if(!s)return'';
    return String(s)
      .replace(/ç/g,'c').replace(/Ç/g,'C')
      .replace(/ğ/g,'g').replace(/Ğ/g,'G')
      .replace(/ı/g,'i').replace(/İ/g,'I')
      .replace(/ö/g,'o').replace(/Ö/g,'O')
      .replace(/ş/g,'s').replace(/Ş/g,'S')
      .replace(/ü/g,'u').replace(/Ü/g,'U');
  }

  // ─── CHART → PNG ───
  function buildChartPNG(labels,values,cFn,refLine,yMin=0,yMax=null){
    const v2=values.filter(v=>isFinite(v)&&v>0);
    const dMax=v2.length?Math.max(...v2):0;
    const rMax=refLine!==undefined?refLine:0;
    const safeMax=yMax||Math.max(dMax*1.3+1,rMax*1.3+1,1);
    return{labels,values,cFn,refLine,yMin,safeMax,_isChart:true};
  }

  // ─── SECTION HEADER ───
  function sectionHeader(doc,x,y,w,h,bgCol,lblBg,title,a1l,a1bg,a1v,a2l,a2bg,a2v){
    setBG(bgCol); doc.rect(x,y,w,h,'F');
    // Label pill
    setBG(lblBg); const lw=title.length*1.55+4;
    doc.rect(x+1,y+0.8,lw,h-1.6,'F');
    setTXT('#ffffff'); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
    doc.text(tr(title),x+2.5,y+h-2);
    // Avg boxes
    let rx=x+w-1;
    [[a2l,a2bg,a2v],[a1l,a1bg,a1v]].forEach(([lbl,bg,val])=>{
      if(!lbl)return;
      const vw=String(val).length*2.2+4;
      const ll=lbl.length*1.6+2;
      rx-=vw;
      setBG(bg); doc.rect(rx,y+0.8,vw,h-1.6,'F');
      setTXT('#ffffff'); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
      doc.text(String(val),rx+vw/2,y+h-2,{align:'center'});
      rx-=ll+2;
      setTXT('#475569'); doc.setFont('helvetica','normal'); doc.setFontSize(6);
      doc.text(tr(lbl),rx+ll,y+h-2,{align:'right'});
    });
  }

  // ─── ADD CHART SECTION ───
  function parseRGBA(s){
    if(!s||typeof s!=='string')return[100,100,200];
    const m=s.replace(/\s/g,'').match(/rgba?\((\d+),(\d+),(\d+)(?:,([\d.]+))?\)/);
    if(!m)return[100,100,200];
    const r=+m[1],g=+m[2],b=+m[3],a=m[4]!==undefined?+m[4]:1;
    return[Math.round(r*a+255*(1-a)),Math.round(g*a+255*(1-a)),Math.round(b*a+255*(1-a))];
  }
  function drawVectorChart(doc,cx,cy,cw,ch,cd){
    if(!cd||!cd._isChart)return;
    const{labels,values,cFn,refLine,yMin,safeMax}=cd;
    const n=values.length;if(!n)return;
    const PL=7,PR=2,PT=2,PB=8,pw=cw-PL-PR,ph=ch-PT-PB,ox=cx+PL,oy=cy+PT;
    doc.setFillColor(255,255,255);doc.rect(cx,cy,cw,ch,'F');
    doc.setDrawColor(210,210,210);doc.setLineWidth(0.15);
    for(let i=0;i<=4;i++){
      const gy=oy+ph-(ph*i/4);
      doc.line(ox,gy,ox+pw,gy);
      const lv=yMin+(safeMax-yMin)*i/4;
      doc.setFontSize(4.5);doc.setTextColor(100,100,100);
      doc.text(lv%1===0?String(Math.round(lv)):lv.toFixed(1),ox-1,gy+1,{align:'right'});
    }
    const bw=Math.max(pw/n*0.6,0.5),gap=pw/n,range=safeMax-yMin||1;
    values.forEach((v,i)=>{
      const val=isFinite(v)?Math.max(v,0):0;
      const bh=val>0?Math.max(ph*(Math.min(val,safeMax)-yMin)/range,0.8):0;
      const bx=ox+i*gap+(gap-bw)/2,by=oy+ph-bh;
      const rgb=parseRGBA(cFn(val,i));
      doc.setFillColor(rgb[0],rgb[1],rgb[2]);
      if(bh>0)doc.rect(bx,by,bw,bh,'F');
    });
    if(refLine!==undefined&&refLine>yMin&&refLine<safeMax){
      const ry=oy+ph-ph*(refLine-yMin)/(safeMax-yMin);
      doc.setDrawColor(192,57,43);doc.setLineWidth(0.4);
      doc.setLineDashPattern([1.5,1],0);
      doc.line(ox,ry,ox+pw,ry);
      doc.setLineDashPattern([],0);
    }
    const step=Math.max(1,Math.ceil(n/12));
    doc.setFontSize(4);doc.setTextColor(80,80,80);
    labels.forEach((lbl,i)=>{
      if(i%step!==0)return;
      doc.text(String(lbl),ox+i*gap+gap/2,oy+ph+PB-1,{align:'center'});
    });
    doc.setDrawColor(180,180,180);doc.setLineWidth(0.2);
    doc.rect(ox,oy,pw,ph,'S');
  }
  function addChartSection(doc,x,y,w,hdr,chartH,bgH,lblBg,title,a1l,a1bg,a1v,a2l,a2bg,a2v,pngData){
    const total=hdr+chartH;
    setSTR('#c8d0dc');doc.setLineWidth(0.3);
    doc.rect(x,y,w,total,'S');
    sectionHeader(doc,x,y,w,hdr,bgH,lblBg,title,a1l,a1bg,a1v,a2l,a2bg,a2v);
    drawVectorChart(doc,x+0.5,y+hdr+0.3,w-1,chartH-0.8,pngData);
    return y+total+0.8;
  }

  const dates=DR.map(d=>_sD(d.date));
  const zeros=dates.map(()=>0);

  setProgress(10,'Grafikler oluşturuluyor...');

  // Tüm chart PNG'lerini üret
  // Grafikleri sırayla üret (telefon belleğini korumak için)
  setProgress(15,'Grafik 1/13...');
  const pEPAP=buildChartPNG(dates,DR.map(d=>d.epap),()=>'rgba(20,100,160,.9)',undefined,8,16);
  setProgress(20,'Grafik 2/13...');
  const pAI=buildChartPNG(dates,DR.map(d=>d.ai),v=>v>5?'rgba(192,57,43,.9)':'rgba(67,56,202,.9)',5);
  setProgress(25,'Grafik 3/13...');
  const pAHI=buildChartPNG(dates,DR.map(d=>d.ahi),v=>v>5?'rgba(192,57,43,.9)':'rgba(67,56,202,.8)',5);
  setProgress(30,'Grafik 4/13...');
  const pLeak=buildChartPNG(dates,DR.map(d=>d.leak),v=>v>0.24?'rgba(192,57,43,.9)':v>0.15?'rgba(232,151,10,.9)':'rgba(190,24,93,.85)',0.24);
  setProgress(35,'Grafik 5/13...');
  const pUsage=buildChartPNG(dates,DR.map(d=>+(d.totalMin/60).toFixed(2)),m=>m===0?'rgba(180,190,200,.5)':m>=4?'rgba(42,125,42,.9)':'rgba(192,57,43,.9)',4);
  setProgress(38,'Grafik 6/13...');
  const pApne=buildChartPNG(dates,DR.map(d=>d.ai),v=>v>0?'rgba(13,148,136,.9)':'rgba(13,148,136,.25)',5);
  setProgress(41,'Grafik 7/13...');
  const pHipo=buildChartPNG(dates,zeros,()=>'rgba(234,88,12,.3)');
  setProgress(44,'Grafik 8/13...');
  const pObst=buildChartPNG(dates,zeros,()=>'rgba(124,58,237,.3)');
  setProgress(47,'Grafik 9/13...');
  const pSant=buildChartPNG(dates,DR.map(d=>d.ai),v=>v>0?'rgba(2,132,199,.9)':'rgba(2,132,199,.25)',5);
  setProgress(49,'Grafik 10/13...');
  const pMikst=buildChartPNG(dates,zeros,()=>'rgba(37,99,235,.3)');
  setProgress(50,'Grafik 11/13...');
  const pHorl=buildChartPNG(dates,zeros,()=>'rgba(202,138,4,.3)');
  setProgress(51,'Grafik 12/13...');
  const pRERA=buildChartPNG(dates,zeros,()=>'rgba(190,18,60,.3)');
  setProgress(52,'Grafik 13/13...');
  const pCSR=buildChartPNG(dates,zeros,()=>'rgba(21,128,61,.3)');

  setProgress(50,'Sayfa 1 yazılıyor...');

  // ══════════════════ SAYFA 1 ══════════════════
  let y=MT;

  // Başlık
  doc.setFont('helvetica','bold'); doc.setFontSize(15);
  setTXT('#111111'); doc.text(tr('DETAYLI RAPOR'),ML,y+5);
  // GOLDSLEEP sağ üst
  doc.setFontSize(16);
  setTXT('#1464a0'); doc.text(tr('GOLD'),PW-MR-28,y+5,{align:'left'});
  setTXT('#e8970a'); doc.text('SLEEP',PW-MR-28+doc.getTextWidth('GOLD'),y+5);

  // Sol bilgiler
  const leftInfo=[['Seri No',s.serino,true],['Terapi Tarihi',`${s.first} - ${s.last}`,false],['Toplam Gün',`${s.total} Gün`,false]];
  let ly=y+9;
  leftInfo.forEach(([lbl,val,blue])=>{
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); setTXT('#555555');
    doc.text(tr(lbl),ML,ly);
    doc.setFont(blue?'helvetica':'helvetica',blue?'bold':'normal');
    setTXT(blue?'#1464a0':'#111111');
    doc.text(tr(val),ML+22,ly);
    ly+=4;
  });

  // Sağ bilgiler
  const rightInfo=[['Versiyon:','1.5.0'],['Rapor Tarihi:',new Date().toLocaleDateString('tr-TR')],['Terapi Modu:',s.mode]];
  let ry=y+9;
  rightInfo.forEach(([lbl,val])=>{
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); setTXT('#555555');
    doc.text(tr(lbl),PW-MR-30,ry,{align:'right'});
    doc.setFont('helvetica','normal'); setTXT('#111111');
    doc.text(tr(val),PW-MR-28,ry);
    ry+=4;
  });

  y+=22;
  setSTR('#c8d0dc'); doc.setLineWidth(0.4); doc.line(ML,y,PW-MR,y);
  y+=3;

  // Kullanıcı / Doktor tablosu
  const th=5.5,bh=20,cw2=CW/2;
  setBG('#1464a0'); doc.rect(ML,y,cw2,th,'F');
  setBG('#1464a0'); doc.rect(ML+cw2,y,cw2,th,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); setTXT('#ffffff');
  doc.text(tr('KULLANICI BİLGİLERİ'),ML+2,y+3.5);
  doc.text(tr('DOKTOR BİLGİLERİ'),ML+cw2+2,y+3.5);
  y+=th;
  setBG('#ffffff'); setSTR('#c8d0dc'); doc.setLineWidth(0.3);
  doc.rect(ML,y,cw2,bh,'FD'); doc.rect(ML+cw2,y,cw2,bh,'FD');
  const uRows=['Yaş',`KG   ${s.weight}`,'Tel','Mask'];
  const dRows=['Uzmanlık','Tel','Mail',''];
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); setTXT('#111111');
  uRows.forEach((r,i)=>{doc.text(tr(r),ML+2,y+3+i*4.5);});
  dRows.forEach((r,i)=>{if(r)doc.text(tr(r),ML+cw2+2,y+3+i*4.5);});
  y+=bh+2;

  // Özet Kullanım tablosu
  setBG('#1464a0'); doc.rect(ML,y,CW,5.5,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8); setTXT('#ffffff');
  doc.text(tr('ÖZET KULLANIM RAPORU'),ML+2,y+3.8);
  y+=5.5;

  const ahiC=s.avgAHI>5?[192,57,43]:s.avgAHI>2?[232,151,10]:[42,125,42];
  const sumRows=[
    ['Toplam Gün',`${s.total} Gün`,'Kullanılmayan Günler',`${s.unused} Gün`],
    ['Kullanılan Günler',`${s.used} Gün`,'Ortalama 4 Saat Altı',`${s.below4} Gün`],
    ['Ortalama 4 Saat Üstü',`${s.above4} Gün`,'Kullanılan Gün Ort. Saat',_fH(s.avgU)],
    ['Toplam Kullanım',_fH(s.totalMin),'1 Günde Min Kullanım',s.minU?_fM(s.minU):'—'],
    ['Tüm Günler Ort. Saat',_fM(s.totalMin/s.total),'Frekans',''],
    ['1 Günde Max Kullanım',_fM(s.maxU),'Tidal Hacim',''],
    ['SpO2','','AHI',`${s.avgAHI}`],
  ];
  const rh=4.5,c4=CW/4;
  sumRows.forEach((row,ri)=>{
    const ry2=y+ri*rh;
    const isLast=ri===sumRows.length-1;
    [[ML,row[0],row[1],false],[ML+c4*2,row[2],row[3],row[2]==='AHI']].forEach(([rx2,lbl,val,isAHI],ci)=>{
      setBG(ri%2===0?'#f8fafc':'#ffffff'); setSTR('#c8d0dc'); doc.setLineWidth(0.25);
      doc.rect(rx2,ry2,c4*1.1,rh,'FD');
      doc.rect(rx2+c4*1.1,ry2,c4*0.9,rh,'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(7); setTXT('#6b7a8d');
      doc.text(tr(lbl),rx2+1.5,ry2+rh-1.2);
      if(isAHI){doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...ahiC);}
      else{doc.setFont('helvetica','normal');doc.setFontSize(7);setTXT('#111111');}
      doc.text(String(val),rx2+c4*1.1+1.5,ry2+rh-1.2);
    });
  });
  y+=sumRows.length*rh+3;

  // ─── 3 Grafik Sayfa 1 ───
  const hdr=5;
  const ch1=Math.floor((PH-MT-MB-y-hdr*3-0.8*3)/3);
  y=addChartSection(doc,ML,y,CW,hdr,ch1,'#ddeeff','#1464a0','Cihaz Giriş Ayarları','CPAP','#1464a0',s.epap,'Ort. Basınç','#475569',s.epap,pEPAP);
  y=addChartSection(doc,ML,y,CW,hdr,ch1,'#ede9fe','#4338ca','Apne İndeksi','AI','#4338ca',s.avgAI,'','','','',pAI);
  y=addChartSection(doc,ML,y,CW,hdr,ch1,'#ede9fe','#4338ca','Hipo Apne İndeksi','AHI','#4338ca',s.avgAHI,'','','','',pAHI);

  // Sayfa no
  doc.setFont('helvetica','normal'); doc.setFontSize(7); setTXT('#9ca3af');
  doc.text(tr('1'),PW-MR,PH-5,{align:'right'});

  setProgress(65,'Sayfa 2 yazılıyor...');

  // ══════════════════ SAYFA 2 ══════════════════
  doc.addPage();
  y=MT;
  const ch2=Math.floor((PH-MT-MB-hdr*5-0.8*5)/5);
  const ch2b=ch2+3;
  y=addChartSection(doc,ML,y,CW,hdr,ch2b,'#fce7f3','#be185d','Kaçak','KAÇAK (L)',s.avgLeak>24?'#c0392b':'#be185d',s.avgLeak,'','','','',pLeak);
  y=addChartSection(doc,ML,y,CW,hdr,ch2b,'#f1f5f9','#475569','Günlük Kullanımlar','','','','','','','',pUsage);
  y=addChartSection(doc,ML,y,CW,hdr,ch2,'#ccfbf1','#0d9488','Apne','Apne Ort.','#0d9488',s.avgAI,'','','','',pApne);
  y=addChartSection(doc,ML,y,CW,hdr,ch2,'#fff7ed','#ea580c','Hipopne','HA Ort.','#ea580c','0.00','','','','',pHipo);
  y=addChartSection(doc,ML,y,CW,hdr,ch2,'#f5f3ff','#7c3aed','Obstrüktif Apne','OA Ort.','#7c3aed','0.00','','','','',pObst);
  doc.setFont('helvetica','normal'); doc.setFontSize(7); setTXT('#9ca3af');
  doc.text(tr('2'),PW-MR,PH-5,{align:'right'});

  setProgress(78,'Sayfa 3 yazılıyor...');
  await new Promise(r=>setTimeout(r,50));

  // ══════════════════ SAYFA 3 ══════════════════
  doc.addPage();
  y=MT;
  const ch3=Math.floor((PH-MT-MB-hdr*5-0.8*5)/5);
  y=addChartSection(doc,ML,y,CW,hdr,ch3,'#e0f2fe','#0284c7','Santral Apne','CA Ort.','#0284c7',s.avgAI,'','','','',pSant);
  y=addChartSection(doc,ML,y,CW,hdr,ch3,'#eff6ff','#2563eb','Mikst Apne','MA Ort.','#2563eb','0.00','','','','',pMikst);
  y=addChartSection(doc,ML,y,CW,hdr,ch3,'#fefce8','#ca8a04','Horlama','Horlama Ort.','#ca8a04','0.00','','','','',pHorl);
  y=addChartSection(doc,ML,y,CW,hdr,ch3,'#fff1f2','#be123c','RERA','RERA Ort.','#be123c','0.00','','','','',pRERA);
  y=addChartSection(doc,ML,y,CW,hdr,ch3,'#f0fdf4','#15803d','Cheyne-Stokes Solunumu','CSR Ort.','#15803d','0.00','','','','',pCSR);
  doc.setFont('helvetica','normal'); doc.setFontSize(7); setTXT('#9ca3af');
  doc.text(tr('3'),PW-MR,PH-5,{align:'right'});

  setProgress(88,'Sayfa 4 yazılıyor...');
  await new Promise(r=>setTimeout(r,50));

  // ══════════════════ SAYFA 4+ ══════════════════
  const byM={};
  DR.forEach(d=>{const m=d.date.slice(3);if(!byM[m])byM[m]=[];byM[m].push(d);});
  const mKeys=Object.keys(byM);

  for(let i=0;i<mKeys.length;i+=2){
    doc.addPage();
    y=MT;
    const m1=mKeys[i],m2=mKeys[i+1];
    const halfW=(CW-5)/2;

    // 2 aylık kullanım tablosu
    [[m1,ML],[m2,ML+halfW+5]].forEach(([mon,mx])=>{
      if(!mon)return;
      const days=byM[mon];
      const maxM=Math.max(...days.map(d=>d.totalMin),1);
      setBG('#6b7280'); doc.rect(mx,y,halfW,4.5,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(6.5); setTXT('#ffffff');
      doc.text(tr(`${mon} — Günlük Kullanımlar`),mx+1.5,y+3);
      let dy=y+5.5;
      // Legend
      setBG('#2a7d2a'); doc.rect(mx,dy,3,2.5,'F');
      doc.setFont('helvetica','normal'); doc.setFontSize(5.5); setTXT('#333333');
      doc.text(tr('4 Saat Üzeri'),mx+4,dy+1.8);
      setBG('#c0392b'); doc.rect(mx+22,dy,3,2.5,'F');
      doc.text(tr('4 Saat Altı'),mx+26,dy+1.8);
      dy+=4;
      days.forEach(d=>{
        const pct=d.totalMin>0?Math.round(d.totalMin/maxM*(halfW-18)):0;
        const col=d.totalMin===0?[209,213,219]:d.totalMin>=240?[42,125,42]:[192,57,43];
        doc.setFont('helvetica','normal'); doc.setFontSize(5.5); setTXT('#333333');
        doc.text(tr(d.date),mx,dy+1.8);
        if(pct>0){doc.setFillColor(...col);doc.rect(mx+18,dy+0.3,pct,2.2,'F');}
        doc.setFont('helvetica','bold'); doc.setFontSize(5.5); setTXT('#333333');
        doc.text(tr(d.totalMin?_fM(d.totalMin):'00:00'),mx+18+pct+1,dy+1.8);
        dy+=3;
      });
    });

    y+=Math.max(...[m1,m2].filter(Boolean).map(m=>byM[m].length))*3+14;

    // 2 aylık olaylar tablosu
    [[m1,ML],[m2,ML+halfW+5]].forEach(([mon,mx])=>{
      if(!mon)return;
      const days=byM[mon];
      setBG('#6b7280'); doc.rect(mx,y,halfW,4.5,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(6.5); setTXT('#ffffff');
      doc.text(tr(`${mon} — Günlük Yaşanan Olaylar`),mx+1.5,y+3);
      const hdrs=[['Tarih',16],['Apne',8],['Hipo',8],['Obst.',8],['Sant.',8],['Mikst',8],['Horl.',8],['Süre',8]];
      const hdrBgs=['#9ca3af','#0d9488','#ea580c','#7c3aed','#0284c7','#2563eb','#ca8a04','#9ca3af'];
      let hx=mx,hy=y+5;
      hdrs.forEach(([h,w],hi)=>{
        setBG(hdrBgs[hi]); doc.rect(hx,hy,w,4,'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(5.5); setTXT('#ffffff');
        doc.text(h,hx+w/2,hy+2.7,{align:'center'});
        hx+=w;
      });
      let dy=hy+4;
      days.forEach((d,ri)=>{
        const bg=d.totalMin>=240?[240,253,244]:d.totalMin>0?[253,251,240]:[249,250,251];
        hx=mx;
        hdrs.forEach(([_,w],hi)=>{
          doc.setFillColor(...bg); setSTR('#e5e7eb'); doc.setLineWidth(0.2);
          doc.rect(hx,dy,w,3.5,'FD');
          hx+=w;
        });
        doc.setFont('helvetica','normal'); doc.setFontSize(5.5); setTXT('#333333');
        doc.text(tr(d.date),mx+1,dy+2.4);
        if(d.ai>0){doc.setFont('helvetica','bold');setTXT('#0d9488');doc.text(tr(String(d.ai)),mx+16+4,dy+2.4,{align:'center'});}
        doc.setFont('helvetica','bold'); setTXT('#333333');
        doc.text(tr(d.totalMin?_fM(d.totalMin):'00:00'),mx+halfW-1,dy+2.4,{align:'right'});
        dy+=3.5;
      });
    });

    const pgNum=4+Math.ceil((i+2)/2)-1;
    doc.setFont('helvetica','normal'); doc.setFontSize(7); setTXT('#9ca3af');
    doc.text(tr(String(pgNum)),PW-MR,PH-5,{align:'right'});
  }

  setProgress(97,'PDF kaydediliyor...');

  // İndir
  const fname=`Goldslep_Rapor_${s.first.replace(/\./g,'')}_${s.last.replace(/\./g,'')}.pdf`;
  doc.save(fname);
  setProgress(100,'Tamamlandı!');
  setTimeout(()=>hideProgress(),1200);
  }catch(err){
    hideProgress();
    console.error('PDF hatası:',err);
    alert('PDF oluşturma hatası: '+err.message+'. Lütfen sayfayı yenileyip tekrar deneyin.');
  }
}

function setProgress(pct,msg){
  document.getElementById('progOverlay').classList.add('show');
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progMsg').textContent=msg;
}
function hideProgress(){document.getElementById('progOverlay').classList.remove('show');}

// ════════════ DAY DETAIL ════════════
function selD(i){
  AI=i;renderSB();
  const d=DR[i];
  const s2=stOf(d);
  document.getElementById('MN').innerHTML=`<div style="animation:fu .2s ease">
  <div class="ih">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
      <div style="display:flex;align-items:center;gap:7px"><span style="font-size:18px">🫁</span>
        <div><div style="font-size:16px;font-weight:900"><span style="color:#1464a0">GOLD</span><span style="color:#e8970a">SLEEP</span></div>
        <div style="font-size:8px;color:var(--mut);letter-spacing:.8px">GÜNLÜK RAPOR</div></div>
      </div>
      <div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--blu)">${d.date}</div>

    </div>
    <div class="ihd"></div>
    <div class="ibb">
      <span class="bdg" style="background:#1464a0">📅 ${d.date}</span>
      <span class="bdg" style="background:#e8970a">🔑 ${d.serino}</span>
      <span class="bdg" style="background:#2a7d2a">⏱ ${fM(d.totalMin)}</span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab a" onclick="swT(this,'do')">Özet</div>
    <div class="tab" onclick="swT(this,'dg')">Grafik</div>
    <div class="tab" onclick="swT(this,'dr')">Rapor</div>
  </div>
  <div class="tp a" id="do">
    <div class="so"><div class="so-bar">SEANS BİLGİLERİ</div><div class="so-g">
      <div class="so-r"><span class="so-l">Mod</span><span class="so-v">${d.mode}</span></div>
      <div class="so-r"><span class="so-l">Seri No</span><span class="so-v" style="font-size:8px">${d.serino}</span></div>
      <div class="so-r"><span class="so-l">EPAP</span><span class="so-v">${d.epap} cmH₂O</span></div>
      <div class="so-r"><span class="so-l">IPAP</span><span class="so-v">${d.ipap} cmH₂O</span></div>
      <div class="so-r"><span class="so-l">AHI</span><span class="so-v" style="color:${d.ahi>5?'#c0392b':d.ahi>2?'#e8970a':'#2a7d2a'}">${d.ahi}</span></div>
      <div class="so-r"><span class="so-l">AI</span><span class="so-v" style="color:${d.ai>5?'#c0392b':d.ai>2?'#e8970a':'#2a7d2a'}">${d.ai}</span></div>
      <div class="so-r"><span class="so-l">Kaçak</span><span class="so-v" style="color:${d.leak>24?'#c0392b':d.leak>15?'#e8970a':'#2a7d2a'}">${d.leak} L/dk</span></div>
      <div class="so-r"><span class="so-l">Uyku Süresi</span><span class="so-v" style="color:${d.totalMin>=240?'#2a7d2a':'#c0392b'}">${fM(d.totalMin)}</span></div>
    </div></div>
  </div>
  <div class="tp" id="dg">
    ${CS('dep','#ddeeff','#1464a0','Basınç','EPAP','#1464a0',d.epap,'','','','h95')}
    ${CS('dah','#ede9fe','#4338ca','AHI / AI','','','','','','','h88')}
    ${CS('dlk','#fce7f3','#be185d','Kaçak','','','','','','','h88')}
  </div>
  <div class="tp" id="dr">
    <div class="dtw"><table class="dt">
      <thead><tr><th style="text-align:left">Parametre</th><th>Değer</th><th>Referans</th><th>Durum</th></tr></thead>
      <tbody>${[['AHI',d.ahi+' /saat','< 5',d.ahi>5?'dn':d.ahi>2?'wn':'ok'],['AI',d.ai+' /saat','< 5',d.ai>5?'dn':d.ai>2?'wn':'ok'],
        ['Kaçak',d.leak+' L/dk','< 24',d.leak>24?'dn':d.leak>15?'wn':'ok'],
        ['Uyku',fM(d.totalMin),'≥ 4s',d.totalMin<240&&d.totalMin>0?'wn':'ok'],
        ['EPAP',d.epap+' cmH₂O','4–20','ok'],['IPAP',d.ipap+' cmH₂O','4–30','ok']
      ].map(([p,v,r,c])=>`<tr class="${c}"><td style="text-align:left">${p}</td><td style="font-family:monospace">${v}</td><td style="color:var(--mut)">${r}</td>
        <td><span style="font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;background:${c==='dn'?'#fdf2f2':c==='wn'?'#fef9e7':'#edfbee'};color:${c==='dn'?'#922b21':c==='wn'?'#9a6700':'#1a5c1a'}">${c==='dn'?'Kritik':c==='wn'?'Dikkat':'Normal'}</span></td></tr>`).join('')}
      </tbody></table></div>
  </div>

  let dg=false;
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      if(t.textContent==='Grafik'&&!dg){dg=true;setTimeout(()=>{
        mkBar('dep',['EPAP','IPAP'],[d.epap,d.ipap],()=>'rgba(20,100,160,.9)',0,20);
        mkBar('dah',['AHI','AI'],[d.ahi,d.ai],v=>v>5?'rgba(192,57,43,.9)':'rgba(67,56,202,.9)',0,null,5);
        mkBar('dlk',['Kaçak'],[d.leak],v=>v>24?'rgba(192,57,43,.9)':v>15?'rgba(232,151,10,.9)':'rgba(190,24,93,.85)',0,null,24);
      },60);}
    });
  });
}

function swT(el,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('a'));
  document.querySelectorAll('.tp').forEach(t=>t.classList.remove('a'));
  el.classList.add('a');document.getElementById(id).classList.add('a');
  // Genel bakış Grafikler sekmesine dönüldüğünde yeniden çiz
  if(id==='pg'&&AI===-1&&DR.length){
    requestAnimationFrame(()=>requestAnimationFrame(()=>setTimeout(drawOVCharts,60)));
  }
  // Günlük grafik sekmesi açıldığında grafikleri çiz
  if(id==='dg'&&AI>=0){
    const d=DR[AI];
    requestAnimationFrame(()=>requestAnimationFrame(()=>setTimeout(()=>{
      mkBar('dep',['EPAP','IPAP'],[d.epap,d.ipap],()=>'rgba(20,100,160,.9)',0,20);
      mkBar('dah',['AHI','AI'],[d.ahi,d.ai],v=>v>5?'rgba(192,57,43,.9)':'rgba(67,56,202,.9)',0,null,5);
      mkBar('dlk',['Kaçak'],[d.leak],v=>v>24?'rgba(192,57,43,.9)':v>15?'rgba(232,151,10,.9)':'rgba(190,24,93,.85)',0,null,24);
    },60)));
  }
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('ib').style.display='flex';});
function installApp(){if(!dp)return;dp.prompt();dp.userChoice.then(()=>{dp=null;document.getElementById('ib').style.display='none';});}
